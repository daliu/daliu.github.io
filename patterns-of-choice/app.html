  <style>
    :root { --bg:#fafaf7; --fg:#1f1f1d; --muted:#6b6b67; --border:#d8d8d2; --accent:#2a4a3a; --warn:#8a4a2a; --card:#ffffff; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; background:var(--bg); color:var(--fg); line-height:1.5; font-size:17px; }
    .site-nav { background:white; border-bottom:1px solid var(--border); padding:12px 24px; font-size:14px; color:var(--muted); }
    .site-nav a { color:var(--muted); text-decoration:none; margin-right:16px; }
    .site-nav a:hover { color:var(--accent); }
    .site-nav .home::before { content:"\2190 "; }
    .local-banner { background:#eef4ef; border-bottom:1px solid #cdddd2; padding:8px 24px; text-align:center; font-size:13px; color:var(--accent); }
    .container { max-width:640px; margin:0 auto; padding:48px 24px 80px; min-height:80vh; }
    h1 { font-weight:400; font-size:28px; margin:0 0 8px; }
    h2 { font-weight:500; font-size:22px; margin:0 0 16px; }
    .subhead { color:var(--muted); font-size:18px; margin-bottom:28px; }
    p { margin:0 0 16px; }
    .body-text { margin-bottom:24px; }
    button { font-family:inherit; font-size:17px; background:white; color:var(--fg); border:1.5px solid var(--border); padding:14px 20px; margin:6px 0; cursor:pointer; border-radius:4px; text-align:left; width:100%; transition:border-color 120ms,background-color 120ms; }
    button:hover { border-color:var(--accent); }
    button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    /* a11y: programmatic focus on a swapped-in screen (heading/prompt/container) should
       announce to screen readers without showing a focus ring meant for keyboard nav. */
    [tabindex="-1"]:focus { outline: none; }
    button.primary { background:var(--accent); color:white; border-color:var(--accent); text-align:center; }
    button.primary:hover { background:#1c3528; }
    button.secondary { background:transparent; color:var(--muted); border-color:var(--border); text-align:center; }
    button.ghost { width:auto; display:inline-block; border:none; background:none; color:var(--muted); text-decoration:underline; padding:4px 0; font-size:14px; }
    .timer { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--muted); font-size:14px; margin-bottom:12px; }
    .timer.warn { color:var(--warn); }
    .item-prompt { font-size:18px; margin-bottom:16px; min-height:60px; }
    .meta { font-size:13px; color:var(--muted); margin-top:32px; }
    .meta code { background:white; padding:1px 6px; border-radius:3px; border:1px solid var(--border); }
    .statline { display:flex; gap:24px; margin:0 0 24px; }
    .stat .n { font-size:32px; font-weight:300; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1; }
    .stat .lab { font-size:13px; color:var(--muted); margin-top:4px; }
    .progress { font-size:13px; color:var(--muted); margin-top:8px; }
    .observation { background:white; padding:18px 20px; border-radius:4px; border-left:3px solid var(--accent); font-style:italic; margin:16px 0; }
    .row-prose { font-size:16px; margin:12px 0; }
    .domyield { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin:10px 0; }
    .domyield .name { font-weight:500; }
    .domyield .bar { height:8px; background:#eee; border-radius:4px; overflow:hidden; margin-top:6px; }
    .domyield .fill { height:100%; background:var(--accent); }
    .back-link { display:inline-block; margin-top:28px; color:var(--muted); text-decoration:none; font-size:14px; }
    .danger { color:var(--warn); }
    /* synoptic reveal chart: all areas on one shared axis, a unifying centerline */
    .synoptic { width:100%; height:auto; display:block; margin:10px 0 6px; }
    .synoptic .row-track { stroke:var(--border); stroke-width:1.5; }
    .synoptic .mid { stroke:#bcd0c2; stroke-width:1.5; stroke-dasharray:2 5; }
    .synoptic .conn { stroke:var(--accent); stroke-width:3; stroke-opacity:.45; stroke-linecap:round; stroke-dasharray:1; }
    .synoptic .said { fill:var(--card); stroke:var(--muted); stroke-width:1.5; }
    .synoptic .did { fill:var(--accent); }
    .synoptic .lab { fill:var(--fg); font-size:14px; font-weight:500; }
    .synoptic .sub { fill:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
    .synoptic .axis { fill:var(--muted); font-size:10px; letter-spacing:.4px; text-transform:uppercase; }
    @keyframes poc-pop  { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
    @keyframes poc-draw { from { stroke-dashoffset:1; }          to { stroke-dashoffset:0; } }
    @media (prefers-reduced-motion: no-preference) {
      .synoptic .did, .synoptic .said { transform-box:fill-box; transform-origin:center; animation:poc-pop 680ms cubic-bezier(.22,1.15,.36,1) both; }
      .synoptic .conn { animation:poc-draw 820ms 140ms cubic-bezier(.4,0,.2,1) both; }
    }
    /* reveal read-visuals (each analysis as a colorful, intuitive figure) */
    .viz { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin:10px 0; }
    .viz svg { display:block; width:100%; height:auto; }
    .viz-cap { font-size:14px; margin-top:8px; line-height:1.45; }
    /* one-shot, meaning-bearing motion (the divergence shift drawing in, the
       trajectory drawing first->latest). Gated behind reduced-motion; final state
       is the static figure, so reduced-motion users see the correct result at rest. */
    @keyframes poc-slide { from { transform:translateX(var(--shift,0)); opacity:.35; } to { transform:none; opacity:1; } }
    @keyframes poc-fade  { from { opacity:0; } to { opacity:1; } }
    @keyframes poc-grow  { from { transform:scaleX(0); opacity:.4; }    to { transform:scaleX(1); opacity:1; } }
    @media (prefers-reduced-motion: no-preference) {
      .viz .slidein { transform-box:fill-box; transform-origin:center; animation:poc-slide 1080ms 80ms cubic-bezier(.32,.86,.32,1) both; }
      .viz .drawin  { stroke-dasharray:1; animation:poc-draw 940ms 220ms cubic-bezier(.4,0,.2,1) both; }
      .viz .arrowin { animation:poc-fade 460ms 980ms both; }
      .viz .dotin   { transform-box:fill-box; transform-origin:center; animation:poc-pop 700ms cubic-bezier(.22,1.15,.36,1) both; }
      .viz .growin  { transform-box:fill-box; transform-origin:left center; animation:poc-grow 900ms cubic-bezier(.32,.86,.32,1) both; }
    }

<nav class="site-nav">
  <a href="/" class="home">daliu.github.io</a>

<div class="local-banner">
  Local-first: your choices live only in this browser (IndexedDB) and are computed on your device. Nothing is sent anywhere. This is a working prototype of the real instrument.
</div>
<main class="container" id="app"></main>

<script src="runtime/poc-runtime.js"></script>
<script src="runtime/poc-projection.js"></script>
<script>
// ============================================================================
// Patterns of Choice — app shell (the actual practice, local-first PWA).
// Wires the verified engine (poc-runtime.js) + projection (poc-projection.js)
// over an embedded content bundle into the real loop: daily session -> persisted
// SessionLogEntry events in IndexedDB -> on-device reveal from the user's own log.
//
// This is a working prototype: one quick-fire per day (rotating domains), the
// stated-channel card sort, and the §13 on-device reveal once enough sessions
// exist. No server, no account, no cohort. Erase wipes everything locally.
// ============================================================================

const app = document.getElementById("app");
function render(html){
  app.innerHTML = html;
  window.scrollTo(0,0);
  // a11y: this is a single-page view that swaps content in place, so move focus to
  // the new screen's lead element — keyboard users land on it and screen readers
  // announce it (otherwise focus sticks to the just-clicked button and the change
  // goes unannounced). Falls back through heading -> prompt -> the main container.
  const lead = app.querySelector("h1, h2, .item-prompt") || app;
  lead.setAttribute("tabindex", "-1");
  try { lead.focus({ preventScroll: true }); } catch(_) { lead.focus(); }
}
const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let RT = null, BUNDLE = null, TAGMAP = null;
const USER = "local-user"; // single local user; the device IS the identity

async function loadJSON(path, fallbackGlobal){
  try { const r = await fetch(path); if (r.ok) return await r.json(); } catch(_) {}
  if (fallbackGlobal && window[fallbackGlobal]) return window[fallbackGlobal];
  return null;
}

async function boot(){
  RT = POCRuntime.createRuntime({ corpus_version: "mvp1-2026-06", tag_map_version: "v0.1" });
  await RT.init();
  BUNDLE = await loadJSON("runtime/content-bundle.v0.1.json");
  TAGMAP = await loadJSON("runtime/tag-axis-map.v0.1.json");
  if (!BUNDLE || !TAGMAP){
    render(`<h1>Couldn't load the practice content</h1>
      <p class="body-text">This prototype needs to read its content bundle, which some browsers block when opening the file directly from disk. Try it on the hosted site (<a href="https://daliu.github.io/patterns-of-choice/app.html">daliu.github.io/patterns-of-choice/app.html</a>) or serve this folder over http.</p>
      <a href="./" class="back-link">&larr; Back to the project</a>`);
    return;
  }
  // first run: a short, skippable intro before the (now rich) home — shown once,
  // and only to a genuinely new user (no choices logged yet).
  const onboarded = await RT.getSetting("onboarded");
  const st = await practiceState();
  if (!onboarded && st.sessionCount === 0 && !st.hasCardSort) renderOnboarding(0);
  else renderHome();
}

// --- first-run onboarding (orient before the home; skippable; shown once) ---
const ONBOARD = [
  { title: "A mirror, not a test", body: "Most of us could say what we value. This is a quiet way to notice something harder — where the values you'd <em>state</em> and the ones your <em>choices</em> reveal line up, and where they quietly don't. There are no right answers here, and nothing to pass or fail." },
  { title: "Two halves, a little at a time", body: "You'll say what you value once (a short card sort), then make small, ordinary choices across a few short sessions — some timed and quick, some short stories with room to think. A few people, and one dog, recur: you come to know them, and a choice about someone you know lands differently than the same choice in the abstract. That difference is much of the point." },
  { title: "Yours alone", body: "Everything runs on this device. Your choices live only in this browser and are computed right here — nothing is ever sent anywhere. What comes back is held loosely: never a score, a type, or a verdict, and never a comparison to anyone else. It points inward, at you over time." },
];
function renderOnboarding(step){
  const o = ONBOARD[step], last = step === ONBOARD.length - 1;
  const dots = ONBOARD.map((_, i) => `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px;background:${i === step ? "var(--accent)" : "var(--border)"};"></span>`).join("");
  render(`
    <div style="min-height:56vh;display:flex;flex-direction:column;justify-content:center;">
      <div class="progress" style="margin-bottom:6px;">Patterns of Choice</div>
      <h1 style="font-size:30px;margin-bottom:14px;">${o.title}</h1>
      <p class="body-text" style="font-size:18px;line-height:1.55;">${o.body}</p>
      <button class="primary" onclick="${last ? "finishOnboarding()" : `renderOnboarding(${step + 1})`}">${last ? "Begin" : "Next"}</button>
      ${last ? "" : `<button class="ghost" style="display:block;margin:6px auto 0;" onclick="finishOnboarding()">Skip the intro</button>`}
      <div style="text-align:center;margin-top:26px;">${dots}</div>
    </div>
  `);
}
async function finishOnboarding(){ await RT.setSetting("onboarded", true); renderHome(); }

// --- derive practice state from the event log (everything is a projection) ---
async function practiceState(){
  const evs = await RT.log();
  const sessions = {};            // session_id -> {domain, day}
  const daysSeen = new Set();
  let sessionCount = 0;
  let hasCardSort = false;
  const cardLayers = new Set();
  for (const e of evs){
    if (e.kind === "card_sort") { hasCardSort = true; if (e.payload.layer) cardLayers.add(e.payload.layer); continue; }
    if (e.kind !== "session_log") continue;
    const sid = e.payload.session_id;
    if (!(sid in sessions)){ sessions[sid] = { domain: e.payload.domain }; sessionCount++; }
    daysSeen.add(e.timestamp_iso.slice(0,10));
  }
  return { evs, sessionCount, dayCount: daysSeen.size, hasCardSort, cardLayers,
           lastDomain: lastDomainPlayed(evs) };
}
function lastDomainPlayed(evs){
  for (let i=evs.length-1;i>=0;i--) if (evs[i].kind==="session_log") return evs[i].payload.domain;
  return null;
}
// the three stated reference-selves (self-discrepancy: actual / ideal / admired).
// aspirational is the default first sort; the others are optional, opt-in lenses.
const CARD_LAYERS = [
  { id:"aspirational_self", short:"who you want to be", title:"What you'd say you value",
    blurb:"Keep the five values most like the person you're trying to be. You can't keep them all — the choosing is the point. This is the half you can put into words; your sessions capture the other half." },
  { id:"current_self", short:"who you are now", title:"Who you are now",
    blurb:"Not aspirations — the real present. Keep the five values most true of how you actually are these days, for better or worse." },
  { id:"admired_other", short:"who you admire", title:"Who you admire",
    blurb:"Keep the five values you most admire in the people you look up to — the qualities you notice and respect in others." },
];
function cardLayer(id){ return CARD_LAYERS.find(l => l.id === id) || CARD_LAYERS[0]; }

// rotate domains so each day cycles through the four
const DOMAIN_ROTATION = ["truth-telling","resource-allocation","in-group-out-group","reciprocity-cooperation"];
function nextDomain(lastDomain){
  const i = DOMAIN_ROTATION.indexOf(lastDomain);
  return DOMAIN_ROTATION[(i+1) % DOMAIN_ROTATION.length];
}
function qfForDomain(domain){ return BUNDLE.quickfires.find(q => q.domain === domain) || BUNDLE.quickfires[0]; }

// --- home ---
async function renderHome(){
  const st = await practiceState();
  const ready = await canReveal(st);
  const arcInfos = (await Promise.all(getArcs().map(a => arcInfo(a)))).filter(Boolean);
  const cs = await covState();
  render(`
    <h1>Patterns of Choice</h1>
    <div class="subhead">A daily practice, kept entirely on your device.</div>
    <div class="statline">
      <div class="stat"><div class="n">${st.sessionCount}</div><div class="lab">sessions</div></div>
      <div class="stat"><div class="n">${st.dayCount}</div><div class="lab">days</div></div>
    </div>
    <div class="body-text">
      <p>${st.sessionCount === 0
        ? "Each session is a handful of small, timed choices — about a minute. Come back across several days; once there's enough, you'll see where the values you'd <em>state</em> and the ones your choices <em>reveal</em> line up, and where they don't."
        : "Pick up where you left off. The point isn't any single day — it's the pattern that emerges across them."}</p>
    </div>
    <button class="primary" onclick="startSession()">${st.sessionCount === 0 ? "Begin today's session" : "Today's session"}</button>
    ${(() => {
      const done = st.cardLayers || new Set();
      if (!done.has("aspirational_self"))
        return `<button class="secondary" onclick="startCardSort('aspirational_self')">${st.sessionCount === 0 ? "First, say what you value (2 min)" : "Add the card sort — what you'd say you value"}</button>`;
      const next = CARD_LAYERS.find(l => !done.has(l.id));
      return next ? `<button class="secondary" onclick="startCardSort('${next.id}')">Deepen what you'd say — also sort &ldquo;${next.short}&rdquo; (optional)</button>` : "";
    })()}
    ${ready.ok ? `<button class="secondary" onclick="renderReveal()">See your profile so far</button>`
      : `<div class="progress">Your profile unlocks once you've completed sessions in at least three areas (${ready.have}/3 so far). It's computed here, on your device.${!st.hasCardSort ? " The card sort adds the 'what you'd say' half." : ""}</div>`}
    ${arcInfos.length ? `
      <h3 style="font-weight:500;font-size:17px;margin-top:24px;">Threads</h3>
      <p class="progress" style="margin:2px 0 4px;">People — and one dog — you come back to across your sessions. Each is a relationship that builds; what it turns out to be worth is the point.</p>
      ${arcInfos.filter(ai => ai.prog.completedCount > 0).map(arcCardHtml).join("")}
      ${arcInfos.filter(ai => ai.prog.completedCount === 0).map(ai => `<button class="secondary" style="text-align:left;margin:4px 0;" onclick="startArc('${ai.arc.arc_id}')">${esc(arcHook(ai.arc))} <span style="color:var(--muted)">· begin</span></button>`).join("")}
    ` : ""}
    ${cs && cs.fresh && cs.fresh.length ? `
      <div class="domyield" style="margin-top:14px;">
        <div class="name">A harder question</div>
        <p class="row-prose" style="margin:6px 0 12px;">About something you said you value — what would it take to set it aside? About 90 seconds, and the answer is only for you.</p>
        <button class="secondary" onclick="startCov()">Take it</button>
      </div>` : ""}
    <div class="meta">
      Stored only in this browser. <button class="ghost" onclick="renderData()">your data</button>
    </div>
  `);
}
// --- the H8b abstract twin: the same indivisible trade as the climax, but about an
//     animal you've never met. Presented as a quick (timed) hypothetical, separated
//     in time from the narrative form — the two together are the divergence read. ---
let h8sess = null;
async function startH8Probe(pairId){
  const probe = (BUNDLE.h8Probes || []).find(p => p.pair_id === pairId) || (BUNDLE.h8Probes || [])[0];
  if (!probe){ return renderHome(); }
  const exp = await RT.exportForAnalyzer();     // skip if already answered
  if (exp.session_log.find(e => e.scenario_id === probe.abstract.scenario_id && e.item_id === probe.abstract.item_id && e.option_id != null)){ return renderHome(); }
  const item = probe.abstract;                  // {scenario_id, item_id, prompt, options}
  h8sess = { id: POCRuntime.uuid(), probe, item, t0: Date.now(), timer: null };
  let left = 8;
  render(`
    <div class="timer" id="h8timer" aria-hidden="true">⏱  ${left} seconds</div>
    <div class="item-prompt">${item.prompt}</div>
    ${item.options.map(o => `<button onclick="answerH8Probe('${o.id}')">${o.text}</button>`).join("")}
    <div class="progress">a quick hypothetical &middot; no wrong answer</div>
  `);
  if (!prefersReduced){
    h8sess.timer = setInterval(() => {
      left -= 1;
      const el = document.getElementById("h8timer");
      if (el){ el.textContent = `⏱  ${left} seconds`; if (left <= 3) el.classList.add("warn"); }
      if (left <= 0){ clearInterval(h8sess.timer); answerH8Probe(null); }
    }, 1000);
  }
}
async function answerH8Probe(optionId){
  if (h8sess.timer) clearInterval(h8sess.timer);
  const item = h8sess.item;
  const opt = optionId ? item.options.find(o => o.id === optionId) : null;
  await RT.logSessionChoice({
    user_id: USER, session_id: h8sess.id, timestamp_iso: new Date().toISOString(),
    scenario_id: h8sess.probe.abstract.scenario_id, scenario_type: "h8-abstract-probe",
    domain: h8sess.probe.domain || "resource-allocation",
    item_id: h8sess.probe.abstract.item_id, option_id: optionId,
    tags: opt ? opt.tags : [], response_time_ms: Date.now() - h8sess.t0,
    presented_position: 1, was_timeout: optionId === null,
  });
  render(`
    <h2>Noted.</h2>
    <div class="body-text"><p>${optionId === null
      ? "Time ran out — no answer logged. You can try it again from the start screen."
      : "Logged on your device. You'll see why it was asked once a certain thread has run its course."}</p></div>
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);
}

// --- the recurring-character thread (the H8 mechanism: attachment you actually
//     accrue across sessions, so the gated high-stakes beat lands on a relationship
//     you have, not one the setup asserts). One arc for now: arc-biscuit. ---
function getArcs(){ return BUNDLE.arcs || []; }
function getArc(id){ const a = getArcs(); return id ? (a.find(x => x.arc_id === id) || null) : (a[0] || null); }
function nameKey(arc){ return "npc_name:" + arc.arc_id; }
function arcClimaxPair(arc){ const b = (arc.beats || []).find(x => x.kind === "high_stakes"); return b && b.pairs_with; }
function probeForArc(arc){ const pid = arcClimaxPair(arc); return (BUNDLE.h8Probes || []).find(p => p.pair_id === pid) || null; }
const ARC_HOOKS = { "npc-biscuit": "An animal who comes to depend on you.", "npc-gran": "Someone in your family who counts on you.", "npc-nadia": "A close friend you'll get honest with.", "npc-cole": "Someone who let you down — and starts trying to make it right.", "npc-marisol": "A newcomer on the edge of your circle." };
function arcHook(arc){ return ARC_HOOKS[arc.npc_ref] || "Someone you'll come to know, across your sessions."; }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
// substitute the participant's name for the {token} and the canonical default (the
// reused climax copy literally says the default name). arc-specific (a Gran has no
// token; a Biscuit does) — pass the arc so multi-arc names don't cross-substitute.
function subst(text, name, arc){
  const a = arc || getArc(); if (!a) return text || "";
  const safe = esc(name);
  let out = (text || "");
  if (a.name_token) out = out.split(a.name_token).join(safe);
  return out.split(a.npc_default_name).join(safe);
}
async function arcInfo(arc){
  if (!arc) return null;
  const exp = await RT.exportForAnalyzer();
  const prog = POCProjection.arcProgress(exp.session_log, arc);
  const stored = await RT.getSetting(nameKey(arc));
  const probe = probeForArc(arc);
  const div = probe ? POCProjection.h8Divergence(exp.session_log, probe) : { ok: false };
  const abstractAnswered = !!(probe && exp.session_log.find(e =>
    e.scenario_id === probe.abstract.scenario_id && e.item_id === probe.abstract.item_id && e.option_id != null));
  // instrument events live in the raw log (outside the analyzer export contract)
  const raw = await RT.log();
  const att = POCProjection.attachmentReport(raw.filter(e => e.kind === "instrument").map(e => e.payload), arc);
  const mode = arc.mode || "h8b";
  let h8a = null, twinsTotal = 0, twinsAnswered = 0;
  if (mode === "h8a"){
    h8a = POCProjection.h8aDebiasing(exp.session_log, arc, TAGMAP);
    twinsTotal = (arc.beats || []).filter(b => b.abstract_twin).length;

// the attachment self-report, said plainly (descriptive, no score-as-verdict)
function attachmentLine(att, name){

// one honest sentence relating the felt attachment to the choice that followed

      : `<p class="row-prose" style="margin:6px 0;">Your choice moved toward ${nm} even though you hadn't reported strong attachment — the deed ran ahead of the word.</p>`;

// the H8b divergence, rendered descriptively (reference-free, no verdict)
function h8ReadHtml(div, name){
  if (!div || !div.ok) return "";
  const nm = esc(name);
  let body;
  if (div.concordant && div.narrativePole === "near")
    body = `Twice you faced the same impossible trade — one animal against a faceless many. Once it was a stranger's animal; once it was ${nm}, after your time together. Both times you chose the one. Knowing ${nm} didn't change it — that's already how you weigh it.`;
  else if (div.concordant && div.narrativePole === "far")
    body = `Twice you faced the same impossible trade — one animal against a faceless many. Once it was a stranger's animal; once it was ${nm}, after your time together. Both times you chose the many. Even knowing ${nm}, you weighed the wider claim the same — the attachment didn't move the judgment.`;
  else if (div.shift === "toward-near")
    body = `In the abstract — a stranger's animal against a faceless many — you chose the many. Asked about ${nm}, after your weeks together, you chose ${nm}. That gap is the whole point of this: what attachment does to a judgment that felt settled when it was hypothetical. Neither answer is the right one.`;
  else
    body = `In the abstract — a stranger's animal against a faceless many — you chose the animal. Asked about ${nm}, you chose the wider claim. An unusual direction: the hypothetical pulled you toward the dependent more than the personal did.`;
  return `<div class="observation" style="font-style:normal;"><strong>What knowing ${nm} did to the choice</strong><br>${body}</div>`;
}
// the H8a read, rendered descriptively (no verdict): a debiasing gap (known vs.
// abstract) and, for evolves arcs, the trajectory over the history. Text adapts to
// the arc's kind — "candor" (honesty/trust) vs "inclusion" (widening the circle).
function h8aReadHtml(h8a, name){
  if (!h8a || !h8a.ok) return "";
  const nm = esc(name), inclusion = h8a.kind === "inclusion";
  const parts = [];
  if (h8a.pairs && h8a.pairs.length){
    const candor = {
      "performed-in-abstract": `On the whole you answered more tidily about strangers than about ${nm} — being known by someone pulled your answer toward something more candid, or more careful, than the performed version. That pull is exactly what this notices.`,
      "candid-with-friend": `You were more candid with ${nm} than in the abstract — being known moved you toward the harder truth, not away from it.`,
      "mixed": `It went both ways — on some moments more open with ${nm} than about a stranger, on others less. Knowing someone doesn't bend every call the same direction.`,
      "consistent": `You answered about ${nm} the same way you answered about strangers — knowing them didn't move the call either way.`,
    };
    const incl = {
      "performed-in-abstract": `In the abstract you'd widen your circle for a newcomer — but you held ${nm}, a specific person, a little further out. The generic question invites the generous answer; where you actually drew the line is the other thing.`,
      "candid-with-friend": `You brought ${nm} inside faster than you'd say you would for a stranger in the abstract — knowing her moved her in.`,
      "mixed": `It went both ways — sometimes you included ${nm} more than you'd include a stranger in principle, sometimes less.`,
      "consistent": `You treated ${nm} about the same as a stranger in the abstract — being around her didn't move where your circle's edge sits.`,
    };
    const t = (inclusion ? incl : candor)[h8a.lean];
    if (t) parts.push(t);
  }
  if (h8a.trajectory && h8a.trajectory.scores.length >= 2){
    const candorTraj = {
      rising: `And over your history with ${nm}, your trust returned — you met the later, repaired version of him more openly than the first. The accumulated history moved you.`,
      falling: `Over your history with ${nm}, you grew warier, not warmer — the repair didn't win you back.`,
      flat: `Over your history with ${nm}, your stance held steady — the repair neither won you back nor hardened you further.`,
    };
    const inclTraj = {
      rising: `And over your time around ${nm}, your circle widened to take her in — she went from stranger to someone you'd count as one of yours.`,
      falling: `Over your time around ${nm}, you kept the edge of your circle where it was, or drew it tighter — she stayed outside it.`,
      flat: `Over your time around ${nm}, where you draw your circle held steady — she neither moved decisively in nor out.`,
    };
    parts.push((inclusion ? inclTraj : candorTraj)[h8a.trajectory.direction] || "");
  }
  const body = parts.filter(Boolean).join(" ");
  if (!body) return "";
  const title = inclusion ? "Your circle — who's inside" : (h8a.trajectory ? "Trust, over a history" : "Candor — with a friend vs. in the abstract");
  return `<div class="observation" style="font-style:normal;"><strong>${title}</strong><br>${body} <span style="color:var(--muted)">Neither is a verdict; just where it bends.</span></div>`;
}

// --- cost-of-virtue: the break-point ladder on a value you SAID you hold ---
//     (tied to the stated channel: only offered for values you kept in the sort,
//      so the "earlier you said X matters" framing is honest). ~90s; the
//      within-person trajectory of the break-point is the longitudinal signal.
async function covState(){
  if (!BUNDLE.covProbes || !BUNDLE.covProbes.length) return { matching: [], fresh: [], doneIds: new Set() };
  const evs = await RT.log();
  const keptAsp = new Set(), doneIds = new Set();
  for (const e of evs){
    if (e.kind === "card_sort" && e.payload.layer === "aspirational_self" && e.payload.selected) keptAsp.add(e.payload.value_id);
    if (e.kind === "probe" && e.payload.scenario_type === "cost-of-virtue-probe" && e.payload.scenario_id) doneIds.add(e.payload.scenario_id);
  }
  const matching = BUNDLE.covProbes.filter(c => keptAsp.has(c.value_slot));
  const fresh = matching.filter(c => !doneIds.has(c.id));
  return { matching, fresh, doneIds };
}
let covSess = null;
async function startCov(){
  const cs = await covState();
  const probe = cs.fresh[0] || cs.matching[0];
  if (!probe){ return renderHome(); }
  covSess = { probe, t0: Date.now() };
  renderCov();
}
function renderCov(){
  const c = covSess.probe;
  const rungs = c.ladder.map((r, i) => `<button onclick="answerCov(${i})">${r.label}</button>`).join("");
  render(`
    <div class="progress">a harder question &middot; ${c.domain.replace(/-/g," ")}</div>
    <div class="item-prompt">${c.framing_prompt}</div>

    ${rungs}

}
async function answerCov(choice){
  const c = covSess.probe;
  const isNo = choice === "no";
  const rung = isNo ? null : c.ladder[choice];
  await RT.logProbe({
    user_id: USER, scenario_id: c.id, scenario_type: "cost-of-virtue-probe", domain: c.domain,
    value_slot: c.value_slot, layer: "aspirational_self",
    first_accept_stake: isNo ? null : rung.stake, break_point_rung: isNo ? null : rung.rung,

      : `On ${valLabel}, your break-point landed at <strong>${rung.label}</strong>. Not a verdict — a price, and most people have one. What matters is whether it moves over time.`}</div>
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);
}

// --- a daily session: alternate quick-fire (System 1) and narrative (richer) ---
let sess = null;

// --- attachment_probe beat: a short self-report Likert; logs an instrument event +

function renderAttachmentProbe(){

  const answered = b.items.every(it => a.responses[it.id] != null);
  const scaleBtns = (itemId) => {
    let out = "";
    for (let v = sc.min; v <= sc.max; v++){
      const on = a.responses[itemId] === v;
      out += `<button type="button" onclick="setAttachment('${itemId}',${v})" style="width:auto;display:inline-block;min-width:46px;text-align:center;margin:2px 6px 2px 0;${on?'border-color:var(--accent);background:#f1f5f2;font-weight:600;':''}">${v}</button>`;
    }
    return out;
  };
  render(`
    <div class="progress">a thread that continues &middot; ${esc(a.name)}</div>
    <h2>${esc(b.title)}</h2>
    ${b.intro ? `<p class="body-text" style="color:var(--muted);font-style:italic;">${subst(b.intro, a.name, a.arc)}</p>` : ""}
    <p class="body-text" style="font-size:15px;color:var(--muted);">For each, how true is it for you? <strong>${sc.min}</strong> = ${esc(sc.min_label)}, <strong>${sc.max}</strong> = ${esc(sc.max_label)}. No right answers — and this stays on your device.</p>
    ${b.items.map(it => `<div class="domyield"><div class="row-prose" style="margin:0 0 8px;">${subst(it.text, a.name, a.arc)}</div>${scaleBtns(it.id)}</div>`).join("")}
    <button class="primary" onclick="commitAttachment()" ${answered ? "" : 'disabled style="opacity:.5;cursor:not-allowed;"'}>${answered ? "Done" : "Answer each one"}</button>
  `);
}
function setAttachment(itemId, value){ arcSess.responses[itemId] = value; renderAttachmentProbe(); }
async function commitAttachment(){
  const a = arcSess, b = a.beat;
  if (!b.items.every(it => a.responses[it.id] != null)) return;
  await RT.logInstrument({
    user_id: USER, instrument: b.instrument || "psr-prd-v0.1", arc_id: a.arc.arc_id, beat_id: b.beat_id,
    timestamp_iso: new Date().toISOString(), scale_min: b.scale.min, scale_max: b.scale.max,
    responses: b.items.map(it => ({ item_id: it.id, value: a.responses[it.id] })),
  });
  await RT.logSessionChoice({                       // completion marker -> advances the arc to the climax
    user_id: USER, session_id: a.id, timestamp_iso: new Date().toISOString(),
    scenario_id: b.beat_id, scenario_type: "arc-beat-complete", domain: a.arc.primary_domain,
    arc_id: a.arc.arc_id, beat_id: b.beat_id, item_id: null, option_id: null, tags: [],
    response_time_ms: 0, presented_position: 1, was_timeout: false,
  });
  render(`
    <h2>Thank you — that's just for you.</h2>
    <div class="body-text"><p>Held on your device. Later, it'll sit beside what you actually do when it counts — the said next to the done.</p></div>
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);
}
async function endArcBeat(terminal){
  const a = arcSess;
  // completion marker: empty tags (not scored) but advances the encounter gate
  await RT.logSessionChoice({
    user_id: USER, session_id: a.id, timestamp_iso: new Date().toISOString(),
    scenario_id: a.scenarioId, scenario_type: "arc-beat-complete", domain: a.arc.primary_domain,
    arc_id: a.arc.arc_id, beat_id: a.beat.beat_id,
    item_id: terminal ? terminal.id : null, option_id: null, tags: [],
    response_time_ms: 0, presented_position: a.step + 1, was_timeout: false,
  });
  const isClimax = a.beat.kind === "high_stakes";
  const refl = a.reflection ? subst(a.reflection, a.name, a.arc).split("{chosen_path}").join("the path you took") : "";
  render(`
    <h2>${isClimax ? "After." : "Until next time."}</h2>

    <div class="body-text"><p>${isClimax
      ? `What you chose for ${esc(a.name)} — and what you'd choose for an animal you'd never met — are both in your own log now. The distance between them is the whole point.`
      : `A small thing, logged only on your device. ${esc(a.name)} will be here next time.`}</p></div>
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);

function renderItem(){
  if (!sess || sess.idx >= sess.qf.items.length){ return endSession(); }
  const item = sess.qf.items[sess.idx];
  const t0 = Date.now();
  let left = sess.qf.timer_seconds_per_item || 8;
  render(`
    <div class="timer" id="timer" aria-hidden="true">⏱  ${left} seconds</div>
    <div class="item-prompt">${item.prompt}</div>
    <button onclick="answer('${item.id}','a',${t0})">${item.options[0].text}</button>
    <button onclick="answer('${item.id}','b',${t0})">${item.options[1].text}</button>
    <div class="progress">Item ${sess.idx+1} of ${sess.qf.items.length} &middot; ${sess.domain.replace(/-/g," ")}</div>
  `);
  if (sess.timer) clearInterval(sess.timer);
  if (!prefersReduced){
    sess.timer = setInterval(() => {
      left -= 1;
      const el = document.getElementById("timer");
      if (el){ el.textContent = `⏱  ${left} seconds`; if (left<=3) el.classList.add("warn"); }
      if (left<=0){ clearInterval(sess.timer); answer(item.id, null, t0); }
    }, 1000);
  }
}
async function answer(itemId, optionId, t0){
  if (sess.timer) clearInterval(sess.timer);
  const item = sess.qf.items.find(i => i.id === itemId);
  const opt = optionId ? item.options.find(o => o.id === optionId) : null;
  // persist a real SessionLogEntry through the engine (tags denormalized now)
  await RT.logSessionChoice({
    user_id: USER, session_id: sess.id, timestamp_iso: new Date().toISOString(),
    scenario_id: sess.qf.id, scenario_type: "quick-fire-round", domain: sess.domain,
    item_id: itemId, option_id: optionId,
    tags: opt ? opt.tags : [],
    response_time_ms: Date.now() - t0,
    presented_position: sess.idx + 1, was_timeout: optionId === null,
  });
  sess.idx += 1;
  renderItem();
}
async function endSession(){
  const st = await practiceState();
  render(`
    <h2>Done for today.</h2>
    <div class="observation">${sessionObservation(st)}</div>
    <div class="body-text"><p>That's logged — on your device, nowhere else. Come back another day; the pattern needs time.</p></div>
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);
}
function sessionObservation(st){
  if (st.sessionCount <= 1) return "One session in. Nothing to read yet — and that's the honest state. A single day is a point, not a pattern.";
  if (st.dayCount < 3) return `${st.sessionCount} sessions across ${st.dayCount} day${st.dayCount===1?"":"s"}. Keep going — the profile waits until your choices have spread across a few areas and a few days.`;
  return `${st.sessionCount} sessions across ${st.dayCount} days. There may be enough now to see a first shape — check your profile from the start screen.`;
}

// --- card-sort onboarding: the STATED channel (keep 5 of 20) ---
let cardSel = new Set();
let csLayer = "aspirational_self";
const CS_CAP = 5;
function startCardSort(layer){ csLayer = layer || "aspirational_self"; cardSel = new Set(); renderCardSort(); }
function renderCardSort(){
  const L = cardLayer(csLayer);
  const n = cardSel.size, ready = n === CS_CAP;
  const cards = BUNDLE.values.map(v => {
    const sel = cardSel.has(v.id), dim = (n>=CS_CAP && !sel) ? "opacity:.5;" : "";
    return `<button type="button" style="display:block;text-align:left;${dim}${sel?"border-color:var(--accent);background:#f1f5f2;":""}" onclick="toggleValue('${v.id}')">
      <span style="font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);">${v.label}${sel?" ✓":""}</span><br>${v.anchor}</button>`;
  }).join("");
  render(`
    <div class="progress" style="position:sticky;top:0;background:var(--bg);padding:8px 0;text-align:center;">${esc(L.short)} &middot; <strong style="color:var(--accent);">${n} / ${CS_CAP}</strong></div>
    <h2>${esc(L.title)}</h2>
    <p class="body-text" style="color:var(--muted);font-size:15px;">${L.blurb}</p>
    ${cards}
    <button class="primary" onclick="commitCardSort()" ${ready?"":"disabled style=\"opacity:.5;cursor:not-allowed;\""}>${ready?"Save these five":`Pick ${CS_CAP-n} more`}</button>
    <a href="#" onclick="renderHome();return false;" class="back-link">&larr; Maybe later</a>
  `);
}
function toggleValue(id){
  if (cardSel.has(id)) cardSel.delete(id);
  else if (cardSel.size < CS_CAP) cardSel.add(id);
  renderCardSort();
}
async function commitCardSort(){
  if (cardSel.size !== CS_CAP) return;
  // one CardSortResponse per value: selected=true for kept, false for the rest,
  // so the projection's frac_in_top5 is well-defined over the whole deck.
  const ts = new Date().toISOString();
  for (const v of BUNDLE.values){
    await RT.logCardSort({ user_id: USER, layer: csLayer, value_id: v.id,
                           selected: cardSel.has(v.id), timestamp_iso: ts });
  }
  const kept = BUNDLE.values.filter(v => cardSel.has(v.id)).map(v => v.label);
  const st = await practiceState();
  const remaining = CARD_LAYERS.filter(l => !st.cardLayers.has(l.id));
  render(`
    <h2>Saved.</h2>
    <div class="observation">For &ldquo;${esc(cardLayer(csLayer).short)}&rdquo;, you kept: ${kept.join(", ")}. Held loosely — it's what you'd state today. Whether your everyday choices bear it out is what the sessions are for.</div>
    ${remaining.length
      ? `<p class="body-text" style="color:var(--muted);font-size:15px;">There are other lenses on what you'd say — optional, but together they show which version of you your choices actually track:</p>
         ${remaining.map(l => `<button class="secondary" onclick="startCardSort('${l.id}')">Also sort: ${esc(l.short)}</button>`).join("")}`
      : `<p class="body-text" style="color:var(--muted);font-size:15px;">All three lenses captured — who you are, who you want to be, who you admire. Your sessions are the other half.</p>`}
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);
}

// --- can we compute a reveal? need >=3 domains with a scoreable session ---
async function canReveal(st){
  const exp = await RT.exportForAnalyzer();
  const rev = POCProjection.revealedScores(exp.session_log, TAGMAP);
  const have = Object.keys(rev).length;
  return { ok: have >= 3, have, rev, exp };
}

// --- reveal visual language: a color per domain + SVG read-visuals (descriptive,
//     no verdict). Verified via screenshot preview before porting. ---
const DCOLOR = { "truth-telling":"#2b6cb0", "resource-allocation":"#c0732e", "in-group-out-group":"#2f8f6b", "reciprocity-cooperation":"#9c4f96" };
function dcol(d){ return DCOLOR[d] || "var(--accent)"; }

// H8b divergence: abstract choice vs the choice about a named figure, with a shift arrow.
function divergenceViz(name, domain, div){
  const col = dcol(domain), cool = "#8aa0b8", nm = esc(name);
  const X = p => p === "near" ? 470 : 130, y = 56;
  const aX = X(div.abstractPole), nX = X(div.narrativePole);
  let arrow = "";
  if (div.abstractPole !== div.narrativePole){
    const dir = nX > aX ? 1 : -1;
    arrow = `<line class="drawin" pathLength="1" x1="${aX + 12*dir}" y1="${y}" x2="${nX - 14*dir}" y2="${y}" stroke="${col}" stroke-width="2.5"/>`
      + `<path class="arrowin" d="M ${nX-14*dir} ${y-6} L ${nX-2*dir} ${y} L ${nX-14*dir} ${y+6} Z" fill="${col}"/>`;
  }
  const moved = div.abstractPole !== div.narrativePole;
  const cap = moved
    ? `In the abstract you leaned toward <span style="color:${cool}">the wider claim</span>; asked about ${nm}, you chose ${nm}. <span style="color:var(--muted)">That shift is what attachment does to a settled judgment — neither answer is the right one.</span>`
    : `You weighed it the same in the abstract and about ${nm}. <span style="color:var(--muted)">Knowing ${nm} didn't move the call — that's already where you stand.</span>`;
  return `<div class="viz"><svg viewBox="0 0 600 110" role="img" aria-label="${nm}: abstract choice ${div.abstractPole}, with ${nm} ${div.narrativePole}">
    <text x="300" y="20" text-anchor="middle" style="fill:${col};font-size:15px;font-weight:600">${nm}</text>
    <text x="58" y="${y+4}" text-anchor="middle" style="fill:${cool};font-size:12px">the wider claim</text>
    <text x="542" y="${y+4}" text-anchor="middle" style="fill:${col};font-size:12px">${nm}</text>
    <line x1="110" y1="${y}" x2="490" y2="${y}" stroke="var(--border)" stroke-width="2"/>${arrow}
    <circle cx="${aX}" cy="${y}" r="9" fill="var(--card)" stroke="var(--muted)" stroke-width="2"/>
    <text x="${aX}" y="${y+28}" text-anchor="middle" style="fill:var(--muted);font-size:11px">in the abstract</text>
    <circle class="slidein" style="--shift:${(aX-nX).toFixed(1)}px" cx="${nX}" cy="${y}" r="10" fill="${col}"/>
    <text x="${nX}" y="${y-16}" text-anchor="middle" style="fill:${col};font-size:11px">with ${nm}</text>
  </svg><div class="viz-cap">${cap}</div></div>`;
}

// cost-of-virtue: a stake ladder per value with the break-point marked.
function covLadderViz(items){
  const ladder = [10,100,1000,10000,100000], rowH = 52, top = 6, H = top + items.length*rowH + 8;
  const lx = i => 150 + (i/(ladder.length-1))*(560-150);
  let rows = "";
  items.forEach((it,r) => {
    const rt = top+r*rowH, yL = rt+18, yT = rt+34, col = dcol(it.domain);
    rows += `<text x="0" y="${yL+5}" style="fill:${col};font-size:14px;font-weight:600">${esc(it.value)}</text>`
      + `<line x1="150" y1="${yT}" x2="560" y2="${yT}" stroke="var(--border)" stroke-width="2"/>`;
    ladder.forEach((s,i) => { rows += `<line x1="${lx(i)}" y1="${yT-4}" x2="${lx(i)}" y2="${yT+4}" stroke="var(--border)" stroke-width="1.5"/>`
      + `<text x="${lx(i)}" y="${yT+16}" text-anchor="middle" style="fill:var(--muted);font-size:9px">$${s>=1000?(s/1000)+'k':s}</text>`; });
    const dly = `style="animation-delay:${r*150+220}ms"`;
    if (it.no_break) rows += `<circle class="dotin" ${dly} cx="572" cy="${yT}" r="7" fill="${col}"/><text x="572" y="${yT-11}" text-anchor="end" style="fill:${col};font-size:10px">wouldn't</text>`;
    else { const idx = ladder.indexOf(it.stake), cx = idx>=0 ? lx(idx) : 150; rows += `<circle class="dotin" ${dly} cx="${cx}" cy="${yT}" r="7" fill="${col}"/>`; }
  });
  return `<div class="viz"><svg viewBox="0 0 600 ${H}">${rows}</svg><div class="viz-cap" style="color:var(--muted)">The smallest amount at which you'd set each aside. A price isn't a verdict — most people have one; the signal is whether it drifts.</div></div>`;
}

// self-alignment: which stated "you" your choices track (longer bar = closer).
function alignViz(byLayer){
  const rowH = 44, top = 6, H = top + byLayer.length*rowH + 6;
  const bx = t => 180 + ((Math.max(-1,Math.min(1,t))+1)/2)*(560-180);
  let rows = "";
  byLayer.forEach((x,i) => {
    const rt = top+i*rowH, y = rt+20, closest = i===0, c = closest ? "var(--accent)" : "#b9c2bb";
    rows += `<text x="0" y="${y+5}" style="fill:${closest?'var(--accent)':'var(--muted)'};font-size:14px;font-weight:${closest?700:400}">${esc(x.label)}</text>`
      + `<line x1="180" y1="${y}" x2="560" y2="${y}" stroke="#eee" stroke-width="8" stroke-linecap="round"/>`
      + `<line class="growin" style="animation-delay:${i*140+200}ms" x1="180" y1="${y}" x2="${bx(x.tau).toFixed(1)}" y2="${y}" stroke="${c}" stroke-width="8" stroke-linecap="round"/>`
      + (closest ? `<text x="565" y="${y+4}" style="fill:var(--accent);font-size:11px">closest</text>` : "");
  });
  return `<div class="viz"><svg viewBox="0 0 600 ${H}">${rows}</svg><div class="viz-cap" style="color:var(--muted)">How closely your everyday choices track each version of yourself you described.</div></div>`;
}

// evolves trajectory: the value (trust / inclusion) across the ordered beats.
function trajViz(name, domain, scores, lo, hi){
  const col = dcol(domain), n = scores.length, X = i => 60 + (i/(n-1))*(540-60), Y = v => 96 - ((Math.max(-1,Math.min(1,v))+1)/2)*76;

// --- shareable portrait: render the reveal to a self-contained PNG, entirely on
//     device (SVG -> canvas -> download). Descriptive + inward-pointing; the image
//     is the user's own mirror, never a ranking. Absolute colors (no CSS vars) so it
//     renders standalone. ---
let revealData = null; // stashed by renderReveal for the share image
function buildShareSvg(rd){
  const DL = {"truth-telling":"truth-telling","resource-allocation":"resource allocation","in-group-out-group":"in-group / out-group","reciprocity-cooperation":"reciprocity & cooperation"};
  const PAD=64, W=1080, X = v => PAD+44 + ((Math.max(-1,Math.min(1,v))+1)/2)*(W-PAD-44-PAD);
  const ds = (rd.domains||[]).filter(d => rd.rev[d]);
  let y = 132, body = "";
  // header
  body += `<text x="${PAD}" y="78" class="h">Patterns of Choice</text>`
    + `<text x="${PAD}" y="110" class="sub">what I'd say I value, set against what my choices revealed</text>`;
  // synoptic
  const rowH=58;
  ds.forEach(d => {
    const col=rd.color[d], m=rd.rev[d].revealed_score_mean, didX=X(m).toFixed(1);
    const hasS = rd.stated && (d in rd.stated); const saidX = hasS ? X(rd.stated[d]*2-1) : null;
    const yT=y+34;
    body += `<text x="${PAD}" y="${y+16}" class="lab" fill="${col}">${DL[d]}</text>`
      + `<text x="${W-PAD}" y="${y+16}" text-anchor="end" class="num">${m>=0?"+":""}${m.toFixed(2)}</text>`
      + `<line x1="${PAD+44}" y1="${yT}" x2="${W-PAD}" y2="${yT}" stroke="#e7e7e2" stroke-width="6" stroke-linecap="round"/>`;
    if (saidX!==null){ const lo=Math.min(+didX,saidX).toFixed(1), hi=Math.max(+didX,saidX).toFixed(1);
      body += `<line x1="${lo}" y1="${yT}" x2="${hi}" y2="${yT}" stroke="${col}" stroke-width="6" stroke-opacity=".35" stroke-linecap="round"/>`
        + `<circle cx="${saidX.toFixed(1)}" cy="${yT}" r="9" fill="#ffffff" stroke="${col}" stroke-width="2.5"/>`; }
    body += `<circle cx="${didX}" cy="${yT}" r="10" fill="${col}"/>`;
    y += rowH;
  });
  const midX = X(0).toFixed(1);
  body += `<line x1="${midX}" y1="${152}" x2="${midX}" y2="${y-rowH+34+14}" stroke="#cdd6cf" stroke-width="1.5" stroke-dasharray="2 6"/>`;
  body += `<text x="${PAD+44}" y="${y+6}" class="ax">away from it</text><text x="${midX}" y="${y+6}" text-anchor="middle" class="ax">neutral</text><text x="${W-PAD}" y="${y+6}" text-anchor="end" class="ax">leaned into it</text>`;
  body += `<text x="${PAD+44}" y="${y+26}" class="leg">${rd.stated?'○ what I’d say · ● what I did':'● what I did'} — each area on its own axis</text>`;
  y += 56;
  // optional H8b divergence (signature)
  if (rd.div){
    const col=rd.color[rd.div.domain]||"#2a4a3a", cool="#8aa0b8", nm=rd.div.name, cy=y+44;
    const aX = rd.div.abstractPole==="near"?W-PAD-160:PAD+160, nX = rd.div.narrativePole==="near"?W-PAD-160:PAD+160;
    body += `<text x="${W/2}" y="${y+10}" text-anchor="middle" class="dh" fill="${col}">${esc(nm)}</text>`
      + `<text x="${PAD+70}" y="${cy+5}" text-anchor="middle" class="dl" fill="${cool}">the wider claim</text>`
      + `<text x="${W-PAD-70}" y="${cy+5}" text-anchor="middle" class="dl" fill="${col}">${esc(nm)}</text>`
      + `<line x1="${PAD+150}" y1="${cy}" x2="${W-PAD-150}" y2="${cy}" stroke="#d8d8d2" stroke-width="2.5"/>`;
    if (rd.div.abstractPole!==rd.div.narrativePole){ const dir=nX>aX?1:-1;
      body += `<line x1="${aX+16*dir}" y1="${cy}" x2="${nX-18*dir}" y2="${cy}" stroke="${col}" stroke-width="3"/><path d="M ${nX-18*dir} ${cy-8} L ${nX-3*dir} ${cy} L ${nX-18*dir} ${cy+8} Z" fill="${col}"/>`; }
    body += `<circle cx="${aX}" cy="${cy}" r="12" fill="#ffffff" stroke="#6b6b67" stroke-width="2.5"/><text x="${aX}" y="${cy+34}" text-anchor="middle" class="dl" fill="#6b6b67">in the abstract</text>`
      + `<circle cx="${nX}" cy="${cy}" r="13" fill="${col}"/><text x="${nX}" y="${cy-20}" text-anchor="middle" class="dl" fill="${col}">with ${esc(nm)}</text>`;
    y += 120;
  }
  // footer
  y += 6;
  body += `<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="#e7e7e2" stroke-width="1"/>`;
  body += `<text x="${PAD}" y="${y+34}" class="ft">A mirror, not a score — held loosely, pointed inward.</text>`
    + `<text x="${PAD}" y="${y+58}" class="ftm">Computed on my own device · daliu.github.io/patterns-of-choice</text>`;
  const H = y + 84;
  const style = `text{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif}
    .h{font-size:34px;font-weight:600;fill:#2a4a3a}.sub{font-size:19px;fill:#6b6b67}
    .lab{font-size:19px;font-weight:600}.num{font-size:16px;fill:#6b6b67;font-variant-numeric:tabular-nums}
    .ax{font-size:12px;fill:#9a9a95;letter-spacing:.5px;text-transform:uppercase}.leg{font-size:13px;fill:#6b6b67}
    .dh{font-size:20px;font-weight:600}.dl{font-size:14px}
    .ft{font-size:16px;fill:#1f1f1d}.ftm{font-size:13px;fill:#9a9a95}`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><style>${style}</style><rect width="${W}" height="${H}" fill="#fafaf7"/>${body}</svg>`;
}
async function saveReveal(){
  if (!revealData){ return; }
  const svg = buildShareSvg(revealData);
  const url = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
  const img = new Image();
  img.onload = () => {
    const scale = 2, c = document.createElement("canvas");
    c.width = img.width * scale; c.height = img.height * scale;
    const ctx = c.getContext("2d"); ctx.scale(scale, scale); ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    c.toBlob(async (b) => {
      const file = new File([b], "my-patterns-of-choice.png", { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: "Patterns of Choice" }); return; } catch (_) {}
      }
      const u = URL.createObjectURL(b);
      const a = document.createElement("a"); a.href = u; a.download = "my-patterns-of-choice.png"; a.click();
      URL.revokeObjectURL(u);
    }, "image/png");
  };
  img.onerror = () => { URL.revokeObjectURL(url); };
  img.src = url;
}

// --- the on-device reveal (revealed shape + §13 reads) ---
async function renderReveal(){
  const st = await practiceState();
  const r = await canReveal(st);
  if (!r.ok){ renderHome(); return; }
  const stated = POCProjection.cardSortStated(r.exp.card_sort||[], BUNDLE.valuesByDomain, "aspirational_self");
  const ordering = POCProjection.ipsativeOrdering(r.rev);
  const concordance = POCProjection.wordDeedConcordance(r.rev, stated);
  const align = POCProjection.selfAlignment(r.rev, r.exp.card_sort||[], BUNDLE.valuesByDomain, CARD_LAYERS.map(l => l.id));
  const cov = POCProjection.costOfVirtue(r.exp.probes || []);
  // per-arc H8b reads (each arc that reached its climax): attachment + divergence
  const instrs = (await RT.log()).filter(e => e.kind === "instrument").map(e => e.payload);
  const arcReads = [], h8aReads = [];
  for (const arc of getArcs()){
    const nm = (await RT.getSetting(nameKey(arc))) || arc.npc_default_name;
    if ((arc.mode || "h8b") === "h8a"){
      const h = POCProjection.h8aDebiasing(r.exp.session_log, arc, TAGMAP);
      if (h.ok) h8aReads.push({ nm, domain: arc.primary_domain, h });
      continue;
    }
    const probe = probeForArc(arc);
    const div = probe ? POCProjection.h8Divergence(r.exp.session_log, probe) : { ok: false };
    if (!div.ok) continue;
    arcReads.push({ nm, domain: arc.primary_domain, div, att: POCProjection.attachmentReport(instrs, arc) });
  }
  const covDomain = {}; (BUNDLE.covProbes || []).forEach(c => { covDomain[c.value_slot] = c.domain; });
  const DLAB = {"truth-telling":"truth-telling","resource-allocation":"resource allocation","in-group-out-group":"in-group / out-group","reciprocity-cooperation":"reciprocity & cooperation"};

  // per-domain dumbbell: filled dot = what you DID (revealed mean), and when the
  // card sort exists, a hollow ring = what you SAID (stated frac mapped onto the
  // same axis) with the connecting line as the distance. Honestly scoped: this
  // is your own said-vs-did on your own axis — NOT a cohort-standardized gap
  // (that needs a comparison group; see profile.html / the analyzer).
  const hasStated = Object.keys(stated).length > 0;
  const statedToAxis = f => (f * 2) - 1; // map a [0,1] stated fraction onto the [-1,+1] axis
  // Synoptic chart: every scored area on ONE shared axis with a unifying centerline.
  // filled dot = what you DID (revealed mean); open ring = what you'd SAY (when the
  // card sort exists); the segment is the distance. Center is the axis NEUTRAL — this
  // is your own said-vs-did per area, NOT a score and NOT a cohort-standardized gap.
  const sdoms = POCProjection.DOMAINS.filter(d => r.rev[d]);
  const SW = 600, rowH = 52, sTop = 12, sBot = 36, SH = sTop + sdoms.length * rowH + sBot;
  const SX = v => 24 + ((Math.max(-1, Math.min(1, v)) + 1) / 2) * (576 - 24);
  let srows = "";
  sdoms.forEach((d, i) => {
    const rt = sTop + i * rowH, yL = rt + 16, yT = rt + 38, col = dcol(d);
    const m = r.rev[d].revealed_score_mean, didX = SX(m).toFixed(1);
    const hasS = hasStated && (d in stated);
    const saidX = hasS ? SX(statedToAxis(stated[d])) : null;
    const ns = r.rev[d].n_sessions_contributing;
    srows += `<text class="lab" x="24" y="${yL}" style="fill:${col}">${DLAB[d]}</text>`
      + `<text class="sub" x="576" y="${yL}" text-anchor="end">${m >= 0 ? "+" : ""}${m.toFixed(2)} · ${ns} session${ns === 1 ? "" : "s"}</text>`
      + `<line class="row-track" x1="24" y1="${yT}" x2="576" y2="${yT}"/>`;
    if (saidX !== null) {
      const lo = Math.min(+didX, saidX).toFixed(1), hi = Math.max(+didX, saidX).toFixed(1);
      srows += `<line class="conn" x1="${lo}" y1="${yT}" x2="${hi}" y2="${yT}" pathLength="1" style="animation-delay:${i * 90 + 140}ms;stroke:${col}"/>`
        + `<circle class="said" cx="${saidX.toFixed(1)}" cy="${yT}" r="6.5" style="animation-delay:${i * 90 + 70}ms;stroke:${col}"/>`;
    }
    srows += `<circle class="did" cx="${didX}" cy="${yT}" r="7.5" style="animation-delay:${i * 90}ms;fill:${col}"/>`;
  });
  const yT0 = sTop + 38, yTn = sTop + (sdoms.length - 1) * rowH + 38;
  const midline = `<line class="mid" x1="300" y1="${yT0 - 14}" x2="300" y2="${yTn + 14}"/>`;
  const foot = `<text class="axis" x="24" y="${SH - 12}">away from it</text>`
    + `<text class="axis" x="300" y="${SH - 12}" text-anchor="middle">neutral</text>`
    + `<text class="axis" x="576" y="${SH - 12}" text-anchor="end">leaned into it</text>`;
  const ariaSummary = sdoms.map(d => `${DLAB[d]}: did ${r.rev[d].revealed_score_mean.toFixed(2)}${(hasStated && d in stated) ? ", said " + statedToAxis(stated[d]).toFixed(2) : ""}`).join("; ");
  const bars = `<svg class="synoptic" viewBox="0 0 ${SW} ${SH}" role="img" aria-label="Per-area chart, each on its own neutral-centered axis. ${ariaSummary}.">${midline}${srows}${foot}</svg>
    <div class="progress" style="margin-top:2px;">${hasStated ? "○ what you'd say &middot; ● what you did &middot; " : "● what you did &middot; "}each area on its own axis; center is neutral, not a score.</div>`;

  let ordHtml;
  if (!ordering.ok) ordHtml = `<p class="row-prose">No reliable ordering yet — ${ordering.reason}.</p>`;
  else if (ordering.level) ordHtml = `<p class="row-prose">Across the areas with enough sessions, your choices came out roughly level — you reached for them about equally, relative to your own average.</p>`;
  else ordHtml = `<p class="row-prose">${ordering.rels.map(x => x.tie
      ? `${DLAB[x.a]} and ${DLAB[x.b]} are <em>about the same</em> for you`
      : `you reach for ${DLAB[x.a]} <em>more than</em> ${DLAB[x.b]}`).join("; ")}.</p>`;

  let conHtml = "";
  if (concordance.ok){
    const bandText = {low:"closely", moderate:"only loosely", high:"barely"}[concordance.band];
    conHtml = `<p class="row-prose">The order you'd <em>say</em> you weight these areas tracks the order your <em>choices</em> fell in <strong>${bandText}</strong>.</p>`;
    if (concordance.flips.length){
      const f = concordance.flips[0];
      conHtml += `<p class="row-prose">Worth noticing: you rank <strong>${DLAB[f.said_lower]}</strong> low in what you'd say, but it's among the highest in what you did — an unclaimed strength, not a fault.</p>`;
    }
  } else {
    conHtml = `<p class="row-prose" style="color:var(--muted)">Word-vs-deed comparison needs the card sort (the stated channel) alongside your choices in three areas. <button class="ghost" onclick="startCardSort('aspirational_self')">do the card sort</button></p>`;
  }

  // self-discrepancy: when 2+ stated reference-selves exist, show which one the
  // person's actual choices track most closely (descriptive, single-subject).
  let alignHtml = "";
  if (align.ok && align.byLayer.length >= 2){
    const lab = id => (CARD_LAYERS.find(l => l.id === id) || {}).short || id;
    alignHtml = `<h3 style="font-weight:500;font-size:17px;margin-top:20px;">Which “you” your choices track</h3>`
      + alignViz(align.byLayer.map(x => ({ label: lab(x.layer), tau: x.tau })))
      + `<p class="row-prose">Your everyday choices track <strong>${lab(align.closest)}</strong> most closely. Not a verdict — just where the words and the deeds meet.</p>`;
  }

  // cost-of-virtue: the break-point on a stated value, drawn on a stake ladder
  let covHtml = "";
  if (cov.ok){
    covHtml = `<h3 style="font-weight:500;font-size:17px;margin-top:20px;">What you'd set aside, and for how much</h3>`
      + covLadderViz(cov.byValue.map(x => ({ value: x.value_slot.replace(/_/g, " "), domain: covDomain[x.value_slot] || "truth-telling", stake: x.stake, no_break: x.no_break_point })));
  }

  revealData = { rev: r.rev, stated, domains: POCProjection.DOMAINS, color: DCOLOR,
    div: arcReads.length ? { name: arcReads[0].nm, domain: arcReads[0].domain, abstractPole: arcReads[0].div.abstractPole, narrativePole: arcReads[0].div.narrativePole } : null };
  render(`
    <h2>Your profile so far</h2>
    <p class="body-text" style="color:var(--muted);font-size:15px;">Computed on your device from ${st.sessionCount} sessions. Held loosely — this is early, and it points inward (at you over time), never at anyone else.</p>
    <h3 style="font-weight:500;font-size:17px;">What your choices revealed, by area</h3>
    ${bars}
    <h3 style="font-weight:500;font-size:17px;margin-top:20px;">Where you lean, relative to yourself</h3>
    ${ordHtml}
    ${conHtml}
    ${alignHtml}
    ${covHtml}
    ${arcReads.length ? `<h3 style="font-weight:500;font-size:17px;margin-top:20px;">When it stopped being hypothetical</h3>` + arcReads.map(x => divergenceViz(x.nm, x.domain, x.div) + attachmentLine(x.att, x.nm)).join("") : ""}
    ${h8aReads.length ? `<h3 style="font-weight:500;font-size:17px;margin-top:20px;">Known, vs. in the abstract</h3>` + h8aReads.map(x => (x.h.trajectory ? trajViz(x.nm, x.domain, x.h.trajectory.scores, x.h.kind === "inclusion" ? "outside" : "guard", x.h.kind === "inclusion" ? "inside" : "trust") : "") + h8aReadHtml(x.h, x.nm)).join("") : ""}
    <p class="meta">Relative to your own average, not to other people — and nothing here is a score out of anything, or a verdict. The full reckoning (the stated-vs-revealed <em>gap</em>) needs a comparison group; see the <a href="profile.html">sample profile</a> and the open analyzer for how that's done.</p>
    <button class="secondary" onclick="saveReveal()">Save your portrait — a shareable image</button>
    <button class="primary" onclick="renderHome()">Back to start</button>
    <button class="ghost danger" style="display:block;margin:12px auto 0;" onclick="confirmErase()">Wipe my profile…</button>
  `);
}

// --- data controls (export backup / erase) ---
async function renderData(){
  render(`
    <h2>Your data</h2>
    <div class="body-text">
      <p>Everything you've done lives only in this browser's local storage. It has never been sent anywhere.</p>
    </div>
    <button class="secondary" onclick="downloadBackup()">Download a backup file</button>
    <button class="secondary danger" onclick="confirmErase()">Wipe my profile…</button>
    <a href="#" onclick="renderHome();return false;" class="back-link">&larr; Back</a>
  `);
}
async function downloadBackup(){
  const bundle = await RT.exportBackup();
  const blob = new Blob([JSON.stringify(bundle,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="patterns-of-choice-backup.json"; a.click();
  URL.revokeObjectURL(url);
}
function eraseGate(input){
  const ok = input.value.trim().toUpperCase() === "ERASE";
  const b = document.getElementById("erasebtn");
  if (b){ b.disabled = !ok; b.style.opacity = ok ? "1" : ".5"; b.style.cursor = ok ? "pointer" : "not-allowed"; }
}
function confirmErase(){
  render(`
    <h2 class="danger">Wipe your profile?</h2>
    <div class="body-text">
      <p>This permanently erases <strong>everything</strong> on this device — every choice you've logged, your threads, your card sort, your reveal. There's no undo, and by design no copy anywhere else.</p>
      <p style="color:var(--muted);">If you might want it back, download a backup first.</p>
    </div>
    <button class="secondary" onclick="downloadBackup()">Download a backup first</button>
    <p class="body-text" style="margin:18px 0 8px;">To confirm, type <strong>ERASE</strong>:</p>
    <input id="erasephrase" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="ERASE" aria-label="Type ERASE to confirm"
      oninput="eraseGate(this)" onkeydown="if(event.key==='Enter')doErase()"
      style="font-family:inherit;font-size:17px;padding:12px;width:100%;border:1.5px solid var(--border);border-radius:4px;margin:0 0 10px;" />
    <button id="erasebtn" class="secondary danger" disabled style="opacity:.5;cursor:not-allowed;" onclick="doErase()">Erase everything, permanently</button>
    <button class="primary" onclick="renderData()">Keep my data</button>
  `);
  setTimeout(() => { const el = document.getElementById("erasephrase"); if (el) el.focus(); }, 40);
}
async function doErase(){
  const el = document.getElementById("erasephrase");
  if (!el || el.value.trim().toUpperCase() !== "ERASE") return; // gate (defense in depth)
  await RT.eraseEverything();
  render(`
    <h2>Erased — a clean slate.</h2>
    <div class="body-text"><p>Your profile is gone from this browser. Nothing was ever stored anywhere else, so there's nothing left to delete. Begin again whenever you like.</p></div>
    <button class="primary" onclick="renderHome()">Back to start</button>
  `);
}

boot();

// Register the service worker for offline / installable use. Best-effort:
// failure here must never break the practice (the app works without it).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => { /* offline-install unavailable; app still works online */ });
  });
}
</script>
