<div class="demo-banner">
  Demo — one quick-fire scenario, ~90 seconds. The full instrument is a 4-week daily practice.
</div>

<div class="container" id="app"></div>

<script>
// ============================================================================
// Embedded scenario data — sourced from the research repo's
// scenarios/sample/qf-truth-001.json. In production the corpus would be
// loaded dynamically per the rotation logic in mvp.md.
// ============================================================================

const SCENARIO = {
  id: "qf-truth-001",
  metadata: {
    title: "Quick-fire: Small lies in everyday contexts",
    timer_seconds_per_item: 8,
  },
  items: [
    {
      id: "qf-truth-001-i01",
      prompt: "Your housemate asks if you ate the leftovers they were saving. You did.",
      options: [
        { id: "a", text: "Admit it.", honest: true },
        { id: "b", text: "Say you didn't see them.", honest: false },
      ],
    },
    {
      id: "qf-truth-001-i02",
      prompt: "A friend you don't see often asks if you liked their painting. You didn't.",
      options: [
        { id: "a", text: "Say you loved it.", honest: false },
        { id: "b", text: "Say it wasn't quite your taste.", honest: true },
      ],
    },
    {
      id: "qf-truth-001-i03",
      prompt: "A customer-service agent asks if you've already used the discount code. You have.",
      options: [
        { id: "a", text: "Tell them yes.", honest: true },
        { id: "b", text: "Tell them no.", honest: false },
      ],
    },
    {
      id: "qf-truth-001-i04",
      prompt: "A senior colleague asks during a meeting if you've read the doc they sent. You haven't.",
      options: [
        { id: "a", text: "Admit you haven't yet.", honest: true },
        { id: "b", text: "Imply you have.", honest: false },
      ],
    },
    {
      id: "qf-truth-001-i05",
      prompt: "An online survey, anonymous and unverifiable, asks how many hours you exercised this week. You did less than half what your aspirational answer would be.",
      options: [
        { id: "a", text: "Report it accurately.", honest: true },
        { id: "b", text: "Inflate it.", honest: false },
      ],
    },
    {
      id: "qf-truth-001-i06",
      prompt: "A direct report asks if their recent work has been good. You think it's been mediocre.",
      options: [
        { id: "a", text: "Say it's been good.", honest: false },
        { id: "b", text: "Say there are some things you want to talk through.", honest: true },
      ],
    },
  ],
};

// ============================================================================
// Session log — populated as the user interacts. Local-only; never sent
// off-device in this demo. Production runtime would persist to IndexedDB
// and optionally E2E-encrypted sync per the data-handling-policy spec.
// ============================================================================
const sessionLog = {
  scenarioId: SCENARIO.id,
  startTime: null,
  endTime: null,
  itemResponses: [],
};

const app = document.getElementById("app");
function render(html) { app.innerHTML = html; }

// Respect reduced-motion: suppress the ticking countdown AND the forced timeout
// so these users answer at their own pace by clicking, matching app.html.
const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function renderOpening() {
  render(`
    <h1>Patterns of Choice</h1>
    <div class="subhead">A mirror for the values you live by, alongside the ones you say you live by.</div>
    <div class="body-text">
      <p>This is a daily practice — five minutes a session, three to four weeks before you'll see anything resembling a profile. It will ask you to make small choices and to describe what you care about.</p>
      <p>It will then show you where those two things line up and where they don't. It will not tell you whether your patterns are good or bad.</p>
    </div>
    <button class="primary" onclick="renderCandor()">Begin</button>
    <div class="meta">
      Demo note: the full instrument measures stated values with a 20-item card sort
      and 30 forced-choice pairs. Here that whole channel is compressed into a single
      prediction, set against one quick-fire scenario, so the stated-vs-revealed gap
      fits in about 90 seconds. A real first session runs ~10 minutes.
    </div>
  `);
}

function renderCandor() {
  render(`
    <h2>Before you start</h2>
    <div class="body-text">
      <p>There's something to be honest about up front. The premise of this instrument — that small everyday choices reveal something useful about how you actually live — is not fully established in the research literature.</p>
      <p>Studies of trolley problems and abstract dilemmas have repeatedly failed to predict real behavior. Studies of mundane stakes (small monetary honesty, everyday cooperation) have done better, but no one has yet validated this specific format — a daily-puzzle structure with continuing characters and reflection over weeks. Whether it works is partly what we are figuring out together. Your data shapes that.</p>
      <p>If that uncertainty would make you not want to start, this is the right moment to step away.</p>
    </div>
    <div class="cta-row">
      <button class="primary" onclick="renderQuickfireIntro()">Continue</button>
      <button class="secondary" onclick="renderStepAway()">Step away</button>
    </div>
  `);
}

function renderStepAway() {
  render(`
    <h2>Stepped away</h2>
    <div class="body-text">
      <p>That's a fine choice. The "step away" CTA in the production app does not nag, retarget, or attempt to reconvert. Your decision is logged (per consent) for the eventual study's estimate of ecological-validity-related attrition.</p>
      <p>You can close this tab — or run the demo again.</p>
    </div>
    <button class="secondary" onclick="renderOpening()">Start over</button>
    <a href="./" class="back-link">← Back to project page</a>
  `);
}

function renderQuickfireIntro() {
  render(`
    <h2>A new kind of task</h2>
    <div class="body-text">
      <p>Each moment is a choice between two options. You read it untimed; the moment you reveal the two answers, a short clock starts — so it captures which one you reach for first, not how fast you read.</p>
      <p>The point is to capture what you reach for first — not what you'd choose on reflection. There are no right answers and the timer is part of the data, not part of a test.</p>
    </div>
    <button class="primary" onclick="renderEstimate()">Ready</button>
  `);
}

let predictedHonest = 3;

function renderEstimate() {
  render(`
    <h2>One prediction first</h2>
    <div class="body-text">
      <p>You're about to face six small, ordinary moments — the kind where the
      honest answer and the easy answer aren't the same. Before you start, a
      guess about yourself.</p>
      <p class="estimate-q">Out of the six, how many will you answer with the
      plain, direct truth?</p>
    </div>
    <div class="slider-val"><span id="est-val">3</span><small> of 6</small></div>
    <div class="slider-wrap">
      <input type="range" min="0" max="6" step="1" value="3" id="est-slider"
        aria-label="Out of six items, how many will you answer with the plain, direct truth? Zero to six."
        oninput="document.getElementById('est-val').textContent = this.value">
      <div class="slider-ends"><span>None of them</span><span>All six</span></div>
    </div>
    <button class="primary" onclick="commitEstimate()">Begin</button>
  `);
}

function commitEstimate() {
  predictedHonest = parseInt(document.getElementById("est-slider").value, 10);
  startQuickfire();
}

let currentItemIndex = 0;
let timerInterval = null;

function startQuickfire() {
  sessionLog.startTime = new Date().toISOString();
  sessionLog.itemResponses = [];
  currentItemIndex = 0;
  renderQuickfireItem();
}

function renderQuickfireItem() {
  if (currentItemIndex >= SCENARIO.items.length) {
    renderSessionEnd();
    return;
  }
  if (timerInterval) clearInterval(timerInterval);

  const item = SCENARIO.items[currentItemIndex];

  // Reading phase — untimed. The decision clock does not start until the reader
  // reveals the two options, so response time is decision latency, not reading speed.
  render(`
    <div class="timer" aria-hidden="true">&nbsp;</div>
    <div class="item-prompt">${item.prompt}</div>
    <button class="primary" onclick="revealQuickfireChoices()">I've read it — show the choices</button>
    <div class="meta">Item ${currentItemIndex + 1} of ${SCENARIO.items.length} · take your time reading</div>
  `);
}

function revealQuickfireChoices() {
  const item = SCENARIO.items[currentItemIndex];
  const itemStartTime = Date.now();   // decision clock starts on reveal, not on prompt render
  let timeLeft = SCENARIO.metadata.timer_seconds_per_item;

  render(`
    <div class="timer" id="timer" aria-hidden="true">${prefersReduced ? "&nbsp;" : "⏱  " + timeLeft + " seconds"}</div>
    <div class="item-prompt">${item.prompt}</div>
    <button onclick="answer('${item.id}', 'a', ${itemStartTime})">${item.options[0].text}</button>
    <button onclick="answer('${item.id}', 'b', ${itemStartTime})">${item.options[1].text}</button>
    <div class="meta">Item ${currentItemIndex + 1} of ${SCENARIO.items.length}</div>
  `);

  if (timerInterval) clearInterval(timerInterval);
  if (prefersReduced) return;   // reduced-motion: no countdown, no forced timeout — answer by clicking
  timerInterval = setInterval(() => {
    timeLeft -= 1;
    const timerEl = document.getElementById("timer");
    if (timerEl) {
      timerEl.textContent = `⏱  ${timeLeft} seconds`;
      if (timeLeft <= 3) timerEl.classList.add("warn");
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      answer(item.id, null, itemStartTime);
    }
  }, 1000);
}

function answer(itemId, optionId, itemStartTime) {
  if (timerInterval) clearInterval(timerInterval);
  const responseTime = Date.now() - itemStartTime;
  sessionLog.itemResponses.push({
    itemId, optionId,
    responseTimeMs: responseTime,
    wasTimeout: optionId === null,
  });
  currentItemIndex += 1;
  renderQuickfireItem();
}

function renderSessionEnd() {
  sessionLog.endTime = new Date().toISOString();

  // Revealed honesty: did the option the user chose carry honest:true?
  // A timeout counts as "not the honest answer" — no honest answer was given.
  let honestCount = 0;
  const dots = sessionLog.itemResponses.map(r => {
    if (r.wasTimeout) return '<div class="dot timeout" title="ran out of time"></div>';
    const item = SCENARIO.items.find(it => it.id === r.itemId);
    const opt = item && item.options.find(o => o.id === r.optionId);
    if (opt && opt.honest) { honestCount += 1; return '<div class="dot honest" title="honest answer"></div>'; }
    return '<div class="dot" title="the other answer"></div>';
  }).join("");

  render(`
    <h2>Done for today.</h2>
    <div class="figures">
      <div class="figure said"><div class="n">${predictedHonest}</div><div class="lab">you predicted</div></div>
      <div class="figure did"><div class="n">${honestCount}</div><div class="lab">you chose</div></div>
    </div>
    <div class="dots">${dots}</div>
    <div class="dot-legend">● honest answer&nbsp;&nbsp;·&nbsp;&nbsp;○ the other answer&nbsp;&nbsp;·&nbsp;&nbsp;◌ ran out of time</div>
    <div class="observation">${makeObservation(predictedHonest, honestCount)}</div>
    <div class="body-text">
      <p>One session of six items isn't a measurement — it's a single point with no
      error bars. The instrument earns a conclusion only by watching whether a gap
      like this <em>holds</em>: across weeks, across situations, as the stakes rise.</p>
    </div>
    <a href="app.html"><button class="primary">Begin the full practice →</button></a>
    <button class="secondary" onclick="renderOpening()">Run the demo again</button>
    <a href="./" class="back-link">← Back to project page</a>
    <div class="meta">
      Nothing left your device. In the full practice your choices persist locally
      (IndexedDB) and optionally sync end-to-end-encrypted across your devices.
    </div>
  `);
}

function makeObservation(predicted, actual) {
  const gap = predicted - actual;
  if (gap >= 2) {
    return `You expected ${predicted} of 6 and chose the honest answer ${actual}. That space — between the self you predicted and the one the timer caught — is the whole subject of this instrument.`;
  }
  if (gap <= -2) {
    return `You expected ${predicted} of 6 but chose the honest answer ${actual} — more often than you gave yourself credit for. Under-claiming is its own kind of signal worth tracking.`;
  }
  return `You expected ${predicted} of 6 and chose the honest answer ${actual}. Closely calibrated — today. Whether that holds, or drifts as the stakes change, is exactly what weeks of data would show.`;
}

renderOpening();
</script>

</body>
