<script>
// ============================================================================
// Profile reveal — "Where saying and doing meet."
//
// Renders ONE relationship (stated vs. revealed) across the four domains and
// emphasizes only the distance between them (the gap). Design synthesized from
// three proposals (constellation dumbbell-plot spine + epistolary per-domain
// prose + a single "bring the two marks together" reconciliation gesture).
//
// Data shape is EXACTLY the analyzer's --json output (scripts/analyze.py):
// revealed_scores[], gaps[] {z_revealed, z_stated_aspirational, gap}. Reading
// of each number follows interpretation.md. The embedded sample is a fictional
// single participant authored to span the honest edge cases (a real gap, an
// aligned domain, a negative gap, and a provisional single-session domain) —
// the real 3-user fixtures only yield a truth-telling gap. Provenance copy of
// this object is committed as profile-sample.json.
//
// Operating constraints honored as features: descriptive never prescriptive
// (no "should/improve/better/worse/strong/weak"), no score/verdict/aggregate,
// no social comparison (the only reference is the within-sample z=0 tick, and
// the footnote says so), contemplative not gamified (the gesture reveals a
// fact, it cannot raise a score). Fully client-side; nothing recorded.
// ============================================================================

const SAMPLE = {
  // Fictional single participant. Three domains are past the §10 session
  // minimum (so the §13 ipsative ordering is admissible); reciprocity stays
  // single-session to keep demonstrating the provisional/excluded case.
  // resource-allocation sits close enough to truth-telling that the §13.1
  // noise gate reports them as a TIE rather than a rank.
  revealed_scores: [
    { user_id:"sample-participant", domain:"truth-telling",          revealed_score_mean:0.21, n_sessions_contributing:16, se:0.06, ci_95_low:0.09,  ci_95_high:0.33 },
    { user_id:"sample-participant", domain:"resource-allocation",    revealed_score_mean:0.16, n_sessions_contributing:15, se:0.07, ci_95_low:0.02,  ci_95_high:0.30 },
    { user_id:"sample-participant", domain:"in-group-out-group",     revealed_score_mean:0.55, n_sessions_contributing:15, se:0.07, ci_95_low:0.41,  ci_95_high:0.69 },
    { user_id:"sample-participant", domain:"reciprocity-cooperation", revealed_score_mean:-0.30, n_sessions_contributing:1, se:null, ci_95_low:null, ci_95_high:null }
  ],
  gaps: [
    { user_id:"sample-participant", domain:"truth-telling",       z_revealed:0.20, z_stated_aspirational:0.90, gap:0.70 },
    { user_id:"sample-participant", domain:"resource-allocation", z_revealed:0.05, z_stated_aspirational:0.12, gap:0.07 },
    { user_id:"sample-participant", domain:"in-group-out-group",  z_revealed:0.85, z_stated_aspirational:0.20, gap:-0.65 }
    // reciprocity-cooperation: intentionally no gap row -> single-session, provisional
  ],
  // Aspirational-layer card-sort: fraction of each domain's 5 values kept in the
  // user's top-5 (scoring.md §5.1). Drives the §13.4 word-vs-deed concordance —
  // here truth-telling is said-high and acted-mid (a classic positive gap),
  // while in-group is said-low but acted-high (an "unclaimed strength" flip).
  card_sort_scores: [
    { user_id:"sample-participant", domain:"truth-telling",          layer:"aspirational", frac_in_top5:0.80 },
    { user_id:"sample-participant", domain:"resource-allocation",    layer:"aspirational", frac_in_top5:0.40 },
    { user_id:"sample-participant", domain:"in-group-out-group",     layer:"aspirational", frac_in_top5:0.20 },
    { user_id:"sample-participant", domain:"reciprocity-cooperation", layer:"aspirational", frac_in_top5:0.60 }
  ]
};

// Fixed display order — never sorted (sorting would imply a ranking).
const DOMAIN_ORDER = ["truth-telling","resource-allocation","in-group-out-group","reciprocity-cooperation"];
const DOMAIN_LABEL = {
  "truth-telling":"Truth-telling",
  "resource-allocation":"Resource allocation",
  "in-group-out-group":"In-group / out-group",
  "reciprocity-cooperation":"Reciprocity & cooperation"
};
// Behavioral (not moral) axis poles, from interpretation.md. left = low-axis, right = high-axis.
const POLES = {
  "truth-telling":        { lo:"more guarded",     hi:"more candid" },
  "resource-allocation":  { lo:"more self-keeping", hi:"more sharing" },
  "in-group-out-group":   { lo:"more impartial",   hi:"more loyal" },
  "reciprocity-cooperation":{ lo:"more guarded",   hi:"more trusting" }
};

const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const app = document.getElementById("app");
function render(html){ app.innerHTML = html; window.scrollTo(0,0); }
function byDomain(arr, d){ return arr.find(x => x.domain === d) || null; }
function fmt(z){ return (z>=0?"+":"") + z.toFixed(1); }

// ---- SVG geometry ----------------------------------------------------------
const VW = 600, VH = 84, INSET = 40, ZMAX = 2.2;
function mapX(z){
  const c = Math.max(-ZMAX, Math.min(ZMAX, z));
  return INSET + ((c + ZMAX) / (2*ZMAX)) * (VW - 2*INSET);
}

// classify each domain's state -> drives both chart and prose (single source of truth)
function classify(d){
  const rev = byDomain(SAMPLE.revealed_scores, d);
  const gap = byDomain(SAMPLE.gaps, d);
  if (!gap) {
    if (rev && rev.n_sessions_contributing === 1) return { kind:"provisional", rev, gap:null };
    return { kind:"not_enough", rev, gap:null };
  }
  // within-margin: does the revealed CI span cover the stated mark? (only when CI present)
  let withinMargin = false;
  if (rev && rev.ci_95_low !== null) {
    // map CI and stated onto z-space approximately via the gap row's own z's:
    // the CI is in raw score units; treat the gap as within-margin if |gap| is small
    // relative to the CI half-width expressed in the same z-frame. Conservative proxy:
    const ciHalf = (rev.ci_95_high - rev.ci_95_low) / 2;          // raw units
    const revRaw = rev.revealed_score_mean;
    // express stated in raw-equivalent via ratio of z's (guard divide-by-zero)
    if (Math.abs(gap.z_revealed) > 1e-6) {
      const rawPerZ = Math.abs(revRaw / gap.z_revealed);
      const gapRaw = Math.abs(gap.gap) * rawPerZ;
      withinMargin = gapRaw <= ciHalf;
    }
  }
  if (withinMargin) return { kind:"within_margin", rev, gap };
  const g = gap.gap;
  const sign = g > 0.15 ? "positive" : (g < -0.15 ? "negative" : "aligned");
  return { kind:sign, rev, gap };
}

// ---- deterministic copy engine (descriptive, never prescriptive) -----------
function magWord(a){ a=Math.abs(a); return a<0.4?"a short distance":(a<0.8?"a clear distance":(a<1.4?"a longer distance":"a long distance")); }
function lineWord(a){ a=Math.abs(a); return a<0.4?"a short line":(a<0.8?"a longer line":"a long line"); }

function makeProse(d, st){
  const D = DOMAIN_LABEL[d].toLowerCase();
  const P = POLES[d];
  if (st.kind === "not_enough") {
    return { paragraph:`In ${D}, there is what your choices revealed, but not yet enough of the sample sharing this area to place what you say beside it. So there is a “did” here, and, for now, no “said” to measure it against.`, readings:[], nums:null };
  }
  if (st.kind === "provisional") {
    const z = st.rev ? st.rev.revealed_score_mean : 0;
    const pole = z >= 0 ? P.hi : P.lo;
    return { paragraph:`In ${D}, your choices so far lean toward ${pole} (about ${fmt(z)}), but this rests on a single session — provisional, and easily moved. The instrument holds off on naming a gap here until it has watched more than once.`, readings:[], nums:{ said:null, did:z, n: st.rev?st.rev.n_sessions_contributing:1 } };
  }
  const g = st.gap;
  const pole = P.hi; // candid-side pole word used in templates
  const nums = { said:g.z_stated_aspirational, did:g.z_revealed, gap:Math.abs(g.gap), n: st.rev?st.rev.n_sessions_contributing:null };
  if (st.kind === "within_margin") {
    return { paragraph:`In ${D}, the distance between what you say and what you do is smaller than the uncertainty around it — from ${nums.n} sessions, too early to call a gap. The marks are placed, but lightly; expect them to move.`, readings:[], nums };
  }
  if (st.kind === "aligned") {
    return { paragraph:`In ${D}, what you say and what you do nearly meet; the two marks sit almost on top of each other. Read that as alignment, not as a grade — it is simply where this area rests right now (said ${fmt(nums.said)}, did ${fmt(nums.did)}).`,
      readings:["Lived consistency — saying and doing rest in the same place.","Or a value so habitual you neither stress it in words nor depart from it in action."], nums };
  }
  if (st.kind === "positive") {
    return { paragraph:`In ${D}, the value you say you hold sits further toward ${pole} than the one your choices have shown so far — ${magWord(nums.gap)}, drawn here as ${lineWord(nums.gap)} (said ${fmt(nums.said)}, did ${fmt(nums.did)} — about ${nums.gap.toFixed(1)} SD apart). That distance is yours to close, to widen, or to leave exactly as it is. The instrument has no preference, and from ${nums.n} sessions, no certainty either.`,
      readings:["A growth direction — somewhere you aspire past where the weeks happened to land.","Or simply a value easier to hold in words than the particular choices these weeks offered."], nums };
  }
  // negative
  return { paragraph:`In ${D}, your choices have run further toward ${pole} than the value you state (said ${fmt(nums.said)}, did ${fmt(nums.did)} — about ${nums.gap.toFixed(1)} SD apart). The instrument does not read that as better or worse; only as a distance, with the larger figure on the side of what you did.`,
    readings:["Quiet modesty — you undersell a value you in fact act on.","Or you genuinely weight this less than you say, and act on it for other reasons."], nums };
}

// ---- SVG row ---------------------------------------------------------------
function trackSVG(d, st){
  const P = POLES[d];
  const axisY = 38;
  const zeroX = mapX(0);
  let marks = "";

  // uncertainty band / bracket (drawn first, behind marks)
  if (st.rev && st.rev.ci_95_low !== null && st.gap) {
    // map CI to z-frame via the same rawPerZ proxy used in classify
    let loZ = -ZMAX, hiZ = ZMAX;
    if (Math.abs(st.gap.z_revealed) > 1e-6) {
      const rawPerZ = Math.abs(st.rev.revealed_score_mean / st.gap.z_revealed) || 1;
      loZ = st.gap.z_revealed - (st.rev.revealed_score_mean - st.rev.ci_95_low)/rawPerZ;
      hiZ = st.gap.z_revealed + (st.rev.ci_95_high - st.rev.revealed_score_mean)/rawPerZ;
    }
    const x1 = mapX(loZ), x2 = mapX(hiZ);
    marks += `<rect x="${x1.toFixed(1)}" y="${axisY-9}" width="${(x2-x1).toFixed(1)}" height="18" rx="9" fill="${getCss('--accent')}" fill-opacity="0.10"></rect>`;
  } else if (st.rev && st.rev.n_sessions_contributing === 1) {
    // provisional: dashed open bracket around the lone revealed point
    const x = mapX(st.gap ? st.gap.z_revealed : zToFromRaw(st.rev.revealed_score_mean));
    marks += `<path d="M ${(x-26)} ${axisY-9} h -6 v 18 h 6 M ${(x+26)} ${axisY-9} h 6 v 18 h -6" stroke="${getCss('--accent')}" stroke-width="1.2" fill="none" stroke-dasharray="3 3" opacity="0.7"></path>`;
  }

  // gap line (the figure) — only when we have both marks
  if (st.gap && st.kind !== "not_enough") {
    const xs = mapX(st.gap.z_stated_aspirational);
    const xd = mapX(st.gap.z_revealed);
    const positive = st.gap.gap > 0;
    const col = positive ? getCss('--accent') : getCss('--warn');
    marks += `<line class="gapline" x1="${xs.toFixed(1)}" y1="${axisY}" x2="${(prefersReduced?xd:xs).toFixed(1)}" y2="${axisY}" stroke="${col}" stroke-width="2.5" stroke-linecap="round" opacity="0.7" data-x2="${xd.toFixed(1)}"></line>`;
  }

  // stated ring (omit in provisional / not_enough)
  if (st.gap) {
    const xs = mapX(st.gap.z_stated_aspirational);
    marks += `<circle cx="${xs.toFixed(1)}" cy="${axisY}" r="6" fill="none" stroke="${getCss('--muted')}" stroke-width="1.5"></circle>`;
    marks += `<text x="${xs.toFixed(1)}" y="${axisY-13}" text-anchor="middle" font-size="10" letter-spacing="0.06em" fill="${getCss('--muted')}">SAID</text>`;
  }
  // revealed dot
  let revZ = st.gap ? st.gap.z_revealed : zToFromRaw(st.rev ? st.rev.revealed_score_mean : 0);
  const xd = mapX(revZ);
  const hollow = (st.rev && st.rev.n_sessions_contributing === 1);
  marks += `<circle cx="${xd.toFixed(1)}" cy="${axisY}" r="6" fill="${hollow?'none':getCss('--accent')}" stroke="${getCss('--accent')}" stroke-width="${hollow?1.5:0}"></circle>`;
  marks += `<text x="${xd.toFixed(1)}" y="${axisY+20}" text-anchor="middle" font-size="10" letter-spacing="0.06em" fill="${getCss('--accent')}">DID</text>`;

  const ariaParts = [DOMAIN_LABEL[d] + " track."];
  if (st.gap) ariaParts.push(`Said ${fmt(st.gap.z_stated_aspirational)}, did ${fmt(st.gap.z_revealed)}, ${Math.abs(st.gap.gap).toFixed(1)} standard deviations apart.`);
  else ariaParts.push(`Did about ${fmt(revZ)}; provisional, one session.`);

  return `<svg class="track" viewBox="0 0 ${VW} ${VH}" role="img" aria-label="${ariaParts.join(' ')}">
    <line x1="${INSET}" y1="${axisY}" x2="${VW-INSET}" y2="${axisY}" stroke="${getCss('--border')}" stroke-width="1"></line>
    <line x1="${zeroX}" y1="${axisY-12}" x2="${zeroX}" y2="${axisY+12}" stroke="${getCss('--border')}" stroke-width="1"></line>
    ${marks}
  </svg>
  <div class="poles"><span>&larr; ${P.lo}</span><span>${P.hi} &rarr;</span></div>`;
}

// fallback: position a raw [-1,1] score onto the z-axis when no gap row exists
function zToFromRaw(raw){ return Math.max(-ZMAX, Math.min(ZMAX, raw * 1.6)); }

// read a CSS custom property value (SVG attributes can't use var())
let _cssCache = {};
function getCss(name){
  if (_cssCache[name]) return _cssCache[name];
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  _cssCache[name] = v || "#000";
  return _cssCache[name];
}

// ---- screens ---------------------------------------------------------------
// ---- §13 value-weighting layer (ipsative ordering + word/deed concordance) --
// Both reads are reference-free (computed from this one person's own rows).
// Faithful to scoring.md §13: ordinal relations only, noise-gated ties, the
// >=3-informative-domain rule, single-session domains excluded, and the fixed
// "relative to your own average" caption. No ranks, no scores, no composite.
const WEIGHT_K = 1; // §13.1 noise-gate multiplier (k=1 for the descriptive readout)

function ipsativeOrdering(){
  // informative domains: multi-session (se computable) with a revealed mean
  const inf = SAMPLE.revealed_scores.filter(r => r.se !== null && r.n_sessions_contributing >= 2);
  if (inf.length < 3) return { ok:false, reason:"needs at least three areas with enough sessions" };
  const mbar = inf.reduce((s,r)=>s+r.revealed_score_mean,0) / inf.length;
  const devs = inf.map(r => ({ domain:r.domain, dev:r.revealed_score_mean - mbar, m:r.revealed_score_mean, se:r.se }));
  // total spread within pooled noise? -> "roughly level"
  const spread = Math.max(...devs.map(d=>d.dev)) - Math.min(...devs.map(d=>d.dev));
  const pooledSE = Math.sqrt(devs.reduce((s,d)=>s+d.se*d.se,0)/devs.length);
  if (spread < pooledSE) return { ok:true, level:true, domains:devs.map(d=>d.domain) };
  // sort by dev desc, then build pairwise relations with noise gate
  devs.sort((a,b)=>b.dev - a.dev);
  const rels = [];
  for (let i=0;i<devs.length-1;i++){
    const a=devs[i], b=devs[i+1];
    const gate = WEIGHT_K * Math.sqrt(a.se*a.se + b.se*b.se);
    rels.push({ a:a.domain, b:b.domain, tie: Math.abs(a.m-b.m) <= gate });
  }
  return { ok:true, level:false, order:devs.map(d=>d.domain), rels };
}

function wordDeedConcordance(){
  // domains with BOTH aspirational card-sort and a valid revealed mean
  const cs = {}; (SAMPLE.card_sort_scores||[]).forEach(r => { if (r.layer==="aspirational") cs[r.domain]=r.frac_in_top5; });
  const C = SAMPLE.revealed_scores
    .filter(r => r.se !== null && r.domain in cs)
    .map(r => ({ domain:r.domain, said:cs[r.domain], did:r.revealed_score_mean, se:r.se }));
  if (C.length < 3) return { ok:false, reason:"needs at least three areas with both a stated and a revealed reading" };
  // Kendall tau-b over the person's own two orderings
  let nc=0, nd=0, ts=0, tr=0, flips=[];
  for (let i=0;i<C.length;i++) for (let j=i+1;j<C.length;j++){
    const ds = C[i].said - C[j].said, dr = C[i].did - C[j].did;
    if (ds===0 && dr===0) { ts++; tr++; continue; }
    if (ds===0){ ts++; continue; }
    if (dr===0){ tr++; continue; }
    if (Math.sign(ds)===Math.sign(dr)) nc++;
    else { nd++;
      // named flip: which pair disagrees, and is it fragile (near-equal revealed)?
      const fragile = Math.abs(dr) < 0.12;
      flips.push({ a:C[i].domain, b:C[j].domain, fragile,
        // the "unclaimed strength" direction: said-lower but did-higher
        said_lower: ds<0 ? C[i].domain : C[j].domain,
        did_higher: dr>0 ? C[i].domain : C[j].domain });
    }
  }
  const denom = Math.sqrt((nc+nd+ts)*(nc+nd+tr));
  const tau = denom>0 ? (nc-nd)/denom : 0;
  const band = tau >= 0.6 ? "low" : (tau >= 0.2 ? "moderate" : "high");
  return { ok:true, band, nc, nd, flips, n:C.length };
}

function renderWeightingSection(){
  const ord = ipsativeOrdering();
  const con = wordDeedConcordance();
  let inner = "";

  // --- ipsative ordering ---
  inner += `<h3 style="font-weight:500;font-size:17px;margin:0 0 8px;">What you reached for, relative to yourself</h3>`;
  if (!ord.ok){
    inner += `<p class="row-prose">No reliable ordering — ${ord.reason}.</p>`;
  } else if (ord.level){
    inner += `<p class="row-prose">Across the areas with enough sessions, your choices came out roughly level — you reached for them about equally, relative to your own average. An even shape is as real as a lopsided one.</p>`;
  } else {
    const phrases = ord.rels.map(r =>
      r.tie
        ? `${DOMAIN_LABEL[r.a].toLowerCase()} and ${DOMAIN_LABEL[r.b].toLowerCase()} are <em>about the same</em> for you`
        : `you reach for ${DOMAIN_LABEL[r.a].toLowerCase()} <em>more than</em> ${DOMAIN_LABEL[r.b].toLowerCase()}`
    );
    inner += `<p class="row-prose">${phrases.join("; ")}.</p>`;
  }
  inner += `<p class="scale-foot" style="margin:4px 0 18px;">Relative to your own average, not to other people — and this says nothing about your absolute level. A bottom area can still be one you act on strongly; this is only internal contrast.</p>`;

  // --- word vs deed concordance ---
  inner += `<h3 style="font-weight:500;font-size:17px;margin:18px 0 8px;">Do your words and your choices rank you the same way?</h3>`;
  if (!con.ok){
    inner += `<p class="row-prose">Not enough to say — ${con.reason}.</p>`;
  } else {
    const bandText = { low:"closely", moderate:"only loosely", high:"barely" }[con.band];
    inner += `<p class="row-prose">The order you'd <em>say</em> you weight these areas (from the card sort) tracks the order your <em>choices</em> fell in <strong>${bandText}</strong>.</p>`;
    if (con.flips.length){
      const f = con.flips[0];
      inner += `<p class="row-prose">The clearest disagreement: you rank <strong>${DOMAIN_LABEL[f.said_lower].toLowerCase()}</strong> low in what you'd say, but it's among the highest in what you did — an unclaimed strength, not a fault${f.fragile ? " (though this flip is fragile — one noisy stretch could reverse it)" : ""}. Neither order is the right one; the disagreement is just somewhere to look.</p>`;
    }
  }
  inner += `<p class="scale-foot" style="margin:4px 0 0;">This compares two orderings that are both yours — never you against anyone else. It assumes the behavioral axis points the way most ethical frameworks would say; a particularist would contest even that.</p>`;

  return `<div class="synoptic" style="margin-top:20px;">
    <h2 style="margin:0 0 6px;">What you weight</h2>
    <p class="body-text" style="font-size:15px;color:var(--muted);margin:0 0 16px;">Not a score, and not a type — two readings drawn only from your own data, held as loosely as the sketch above.</p>
    ${inner}
  </div>`;
}

function renderPreReveal(){
  render(`
    <h1>Today is different.</h1>
    <div class="body-text" style="margin-top:24px;">
      <p>You've done about fifteen sessions. Enough that what you've shown us has settled into something measurable. We can show you the early shape of your profile.</p>
      <p>Two cautions before you see it.</p>
      <p>First — this is early. The numbers will move as you keep doing sessions. Treat what you see as a hypothesis about yourself, not a conclusion.</p>
      <p>Second — there is no good or bad here. The point of the profile is not whether you scored high or low on anything. The point is the gap — the places where the version of yourself you say you want to be doesn't quite match the version your everyday choices reveal. That gap is yours to do something about, or to leave alone. We have no opinion on which.</p>
    </div>
    <button class="primary" onclick="renderReadout()">Show me</button>
    <a href="./" class="back-link">&larr; Back to the project</a>
  `);
}

function renderReadout(){
  const states = {};
  DOMAIN_ORDER.forEach(d => states[d] = classify(d));

  let rows = "";
  DOMAIN_ORDER.forEach((d, i) => {
    const st = states[d];
    const prose = makeProse(d, st);
    let numsTable = "";
    if (prose.nums) {
      const rows2 = [];
      if (prose.nums.said !== null && prose.nums.said !== undefined) rows2.push(`<tr><td>what you said</td><td>${fmt(prose.nums.said)} SD</td></tr>`);
      if (prose.nums.did !== null && prose.nums.did !== undefined) rows2.push(`<tr><td>what you did</td><td>${fmt(prose.nums.did)} SD</td></tr>`);
      if (prose.nums.gap !== undefined) rows2.push(`<tr><td>the distance</td><td>${prose.nums.gap.toFixed(1)} SD</td></tr>`);
      if (prose.nums.n) rows2.push(`<tr><td>sessions seen</td><td>${prose.nums.n}</td></tr>`);
      numsTable = `<table class="numtable">${rows2.join("")}</table>`;
    }
    let readingsHtml = "";
    if (prose.readings.length) {
      readingsHtml = `<details class="disclosure"><summary>two ways to read this</summary>
        <div class="reading">${prose.readings[0]}</div>
        <div class="reading"><span class="or">or</span> ${prose.readings[1]}</div></details>`;
    }
    rows += `<div class="row ${i>0?'pending':''}" id="row-${i}">
      <div class="domain-name">${DOMAIN_LABEL[d]}</div>
      ${trackSVG(d, st)}
      <p class="row-prose">${prose.paragraph}</p>
      ${readingsHtml}
      ${numsTable ? `<details class="disclosure"><summary>see the numbers</summary>${numsTable}</details>` : ""}
    </div>`;
  });

  render(`
    <h2>Where what you say and what you do meet — and where they don't.</h2>
    <p class="body-text">Two things were measured separately: the value you say you hold, and the value your choices revealed. Below, for each of four areas, the two are placed together so you can see the distance between them.</p>
    <div class="legend">
      <span class="k"><span class="ring"></span> what you said</span>
      <span class="k"><span class="dot"></span> what you did</span>
      <span class="k"><span class="seg"></span> the distance — the gap</span>
    </div>
    <div class="scale-foot"><span class="mid">the sample's middle &lowast;</span><br>
      &lowast; Positions are relative to the small group in the study so far — not a percentile of people in general. With few people in it, the middle itself will shift.</div>
    <div id="rows">${rows}</div>
    <div class="synoptic" id="synoptic" style="display:none;">
      <div id="synoptic-svg"></div>
      <div class="cap">This is the shape of where your saying and doing currently sit. There is no total here, and nothing to score.</div>
    </div>
    <div id="weighting" style="display:none;"></div>
    <div id="closing" style="display:none;">
      <div class="observation" style="margin-top:28px;">Across these four areas, three of your distances are short and one runs longer — that longer one is where what you say and what you do diverge most right now. Where it points, and whether it matters, is yours to decide.</div>
      <div class="body-text" style="margin-top:24px;">
        <p>You can keep going as you have been. You can pick one of the gaps to focus on. You can also do neither and just keep observing.</p>
        <p>None of those is the right one. Tomorrow's session is the same length as today's, regardless of which you pick.</p>
      </div>
      <div class="cta-row">
        <button class="secondary" onclick="reset()">Keep observing</button>
        <button class="secondary" onclick="reset()">Focus on one gap</button>
        <button class="secondary" onclick="reset()">Take a break</button>
      </div>
      <a href="./" class="back-link">&larr; Back to the project</a>
      <div class="meta">
        Nothing here was recorded or sent anywhere. This sample is a fictional analyzer run; see
        <code>interpretation.md</code> and <code>scripts/analyze.py</code> in the research repo for how each number is read and produced.
      </div>
    </div>
  `);

  // sequential reveal of rows; animate the gap line drawing to length
  revealSequence();
}

function revealSequence(){
  const rows = Array.from(document.querySelectorAll('.row'));
  function show(i){
    if (i >= rows.length){ finishReadout(); return; }
    rows[i].classList.remove('pending');
    const line = rows[i].querySelector('.gapline');
    if (line && !prefersReduced){
      // animate x2 from stated toward revealed
      const target = line.getAttribute('data-x2');
      requestAnimationFrame(() => {
        line.style.transition = 'all 520ms ease';
        line.setAttribute('x2', target);
      });
    }
    const delay = prefersReduced ? 0 : 460;
    if (delay) setTimeout(() => show(i+1), delay); else show(i+1);
  }
  if (prefersReduced){ rows.forEach(r=>r.classList.remove('pending')); finishReadout(); }
  else show(0);
}

function finishReadout(){
  // draw synoptic twin spines once all rows are settled
  const states = DOMAIN_ORDER.map(d => classify(d));
  const n = DOMAIN_ORDER.length;
  const W = 600, rowH = 26, H = n*rowH + 16;
  let saidPts = [], didPts = [];
  states.forEach((st, i) => {
    const y = 14 + i*rowH;
    if (st.gap) saidPts.push(`${mapX(st.gap.z_stated_aspirational).toFixed(1)},${y}`);
    const revZ = st.gap ? st.gap.z_revealed : zToFromRaw(st.rev?st.rev.revealed_score_mean:0);
    didPts.push(`${mapX(revZ).toFixed(1)},${y}`);
  });
  const svg = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="The overall shape of where your stated and revealed values currently sit across the four areas." style="width:100%;display:block;">
    <polyline points="${saidPts.join(' ')}" fill="none" stroke="${getCss('--muted')}" stroke-width="1" opacity="0.5" stroke-dasharray="2 3"></polyline>
    <polyline points="${didPts.join(' ')}" fill="none" stroke="${getCss('--accent')}" stroke-width="1.25" opacity="0.6"></polyline>
    ${didPts.map(p=>{const [x,y]=p.split(',');return `<circle cx="${x}" cy="${y}" r="3" fill="${getCss('--accent')}" opacity="0.7"></circle>`;}).join('')}
  </svg>`;
  const sy = document.getElementById('synoptic-svg');
  if (sy){ sy.innerHTML = svg; document.getElementById('synoptic').style.display = 'block'; }
  const wt = document.getElementById('weighting');
  if (wt){ wt.innerHTML = renderWeightingSection(); wt.style.display = 'block'; }
  const cl = document.getElementById('closing'); if (cl) cl.style.display = 'block';
}

function reset(){ renderPreReveal(); }

renderPreReveal();
</script>

</body>
</html>
