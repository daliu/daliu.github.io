<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Dashboard | Dave Liu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #a371f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        h1 { font-size: 1.8rem; font-weight: 600; }
        .updated { color: var(--text-muted); font-size: 0.9rem; }
        .back-link { color: var(--accent); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .stat-card.battery .stat-value { color: var(--green); }
        .stat-card.heart .stat-value { color: var(--red); }
        .stat-card.sleep .stat-value { color: var(--purple); }
        .stat-card.steps .stat-value { color: var(--accent); }
        .stat-card.stress .stat-value { color: var(--yellow); }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }
        @media (max-width: 700px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .chart-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-muted);
        }
        .chart-container {
            position: relative;
            height: 250px;
        }
        canvas { max-width: 100%; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>⚡ Health Dashboard</h1>
                <span class="updated" id="updated">Loading...</span>
            </div>
            <a href="../" class="back-link">← Back to Portfolio</a>
        </header>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card battery">
                <div class="stat-value" id="current-battery">--</div>
                <div class="stat-label">Body Battery</div>
            </div>
            <div class="stat-card sleep">
                <div class="stat-value" id="current-sleep">--</div>
                <div class="stat-label">Sleep Score</div>
            </div>
            <div class="stat-card steps">
                <div class="stat-value" id="current-steps">--</div>
                <div class="stat-label">Steps (Today)</div>
            </div>
            <div class="stat-card stress">
                <div class="stat-value" id="current-stress">--</div>
                <div class="stat-label">Avg Stress</div>
            </div>
            <div class="stat-card heart">
                <div class="stat-value" id="avg-sleep-hours">--</div>
                <div class="stat-label">Avg Sleep (hrs)</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h2>🔋 Body Battery (30 days)</h2>
                <div class="chart-container">
                    <canvas id="batteryChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>😴 Sleep Score (30 days)</h2>
                <div class="chart-container">
                    <canvas id="sleepChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>👟 Daily Steps (30 days)</h2>
                <div class="chart-container">
                    <canvas id="stepsChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>😌 Stress Level (30 days)</h2>
                <div class="chart-container">
                    <canvas id="stressChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#161b22',
                    borderColor: '#30363d',
                    borderWidth: 1,
                    titleColor: '#e6edf3',
                    bodyColor: '#8b949e',
                    padding: 10,
                    cornerRadius: 6
                }
            },
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'day', displayFormats: { day: 'MMM d' } },
                    grid: { color: '#30363d', drawBorder: false },
                    ticks: { color: '#8b949e' }
                },
                y: {
                    grid: { color: '#30363d', drawBorder: false },
                    ticks: { color: '#8b949e' }
                }
            }
        };

        function createChart(id, data, color, fill = true) {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        data: data,
                        borderColor: color,
                        backgroundColor: fill ? color + '20' : 'transparent',
                        fill: fill,
                        tension: 0.3,
                        pointRadius: 2,
                        pointHoverRadius: 5,
                        borderWidth: 2
                    }]
                },
                options: chartDefaults
            });
        }

        function createRangeChart(id, minData, maxData) {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Max',
                            data: maxData,
                            borderColor: '#3fb950',
                            backgroundColor: '#3fb95030',
                            fill: '+1',
                            tension: 0.3,
                            pointRadius: 2,
                            borderWidth: 2
                        },
                        {
                            label: 'Min',
                            data: minData,
                            borderColor: '#f8514960',
                            backgroundColor: 'transparent',
                            fill: false,
                            tension: 0.3,
                            pointRadius: 2,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    ...chartDefaults,
                    plugins: {
                        ...chartDefaults.plugins,
                        legend: { display: true, labels: { color: '#8b949e' } }
                    }
                }
            });
        }

        async function loadData() {
            try {
                const resp = await fetch('data.json?t=' + Date.now());
                const data = await resp.json();
                
                // Update timestamp
                const updated = new Date(data.updated);
                document.getElementById('updated').textContent = 
                    'Last updated: ' + updated.toLocaleString();
                
                const daily = data.daily.slice(-30); // Last 30 days
                const latest = daily[daily.length - 1];
                
                // Update stat cards
                document.getElementById('current-battery').textContent = 
                    latest?.max_body_battery ?? '--';
                document.getElementById('current-sleep').textContent = 
                    latest?.sleep_score ?? '--';
                document.getElementById('current-steps').textContent = 
                    latest?.total_steps?.toLocaleString() ?? '--';
                document.getElementById('current-stress').textContent = 
                    latest?.avg_stress ?? '--';
                
                // Calculate avg sleep hours
                const sleepHours = daily.filter(d => d.sleep_hours).map(d => d.sleep_hours);
                const avgSleep = sleepHours.length ? 
                    (sleepHours.reduce((a,b) => a+b, 0) / sleepHours.length).toFixed(1) : '--';
                document.getElementById('avg-sleep-hours').textContent = avgSleep;
                
                // Body Battery chart (min/max range)
                createRangeChart('batteryChart',
                    daily.map(d => ({ x: d.date, y: d.min_body_battery })),
                    daily.map(d => ({ x: d.date, y: d.max_body_battery }))
                );
                
                // Sleep chart
                createChart('sleepChart',
                    daily.filter(d => d.sleep_score).map(d => ({ x: d.date, y: d.sleep_score })),
                    '#a371f7'
                );
                
                // Steps chart
                createChart('stepsChart',
                    daily.map(d => ({ x: d.date, y: d.total_steps })),
                    '#58a6ff'
                );
                
                // Stress chart
                createChart('stressChart',
                    daily.filter(d => d.avg_stress).map(d => ({ x: d.date, y: d.avg_stress })),
                    '#d29922',
                    false
                );
                
            } catch (err) {
                console.error('Failed to load data:', err);
                document.getElementById('updated').textContent = 'Failed to load data';
            }
        }

        loadData();
    </script>
</body>
</html>
